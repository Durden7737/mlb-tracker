<!DOCTYPE html>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#f8f9fa;color:#1a1a2e;font-family:'DM Mono','Courier New',monospace;font-size:13px;}
#root{min-height:100vh;}
input,select,button,textarea{font-family:inherit;}
input[type=date]::-webkit-calendar-picker-indicator{filter:none;}
select option{background:#fff;color:#1a1a2e;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:#f1f3f5;}
::-webkit-scrollbar-thumb{background:#ced4da;border-radius:3px;}
input:focus,select:focus,textarea:focus{outline:none;border-color:#2563eb!important;box-shadow:0 0 0 3px rgba(37,99,235,0.1);}

<script>
const {useState,useEffect,useRef,useCallback}=React;
const h=React.createElement;

const LS={
  get:(k)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
};

const TIPS_DEFAULT=["Claude AI","Own Analysis","ChatGPT","Gemini","Grok","Copilot"];
const today=()=>new Date().toISOString().slice(0,10);
const genId=()=>Math.random().toString(36).slice(2,10);
const fmt=(n)=>new Intl.NumberFormat("es-CO",{style:"currency",currency:"COP",maximumFractionDigits:0}).format(n);
const fmtP=(n,d=1)=>(n==null||isNaN(n))?"—":n.toFixed(d)+"%";
const getStake=(b,us)=>b.stakeOverride!=null?b.stakeOverride:Math.round(b.units*us);
const calcPL=(b,result,us)=>{
  if(b.taken===false||b.nobet)return 0;
  const s=getStake(b,us);
  if(result==="win")return Math.round(s*(b.odds-1));
  if(result==="loss")return -s;
  return 0;
};

function Toggle({checked,onChange,label,color="#2563eb"}){

// ── Edit Modal ─────────────────────────────────────────────────────────────
function EditModal({bet,tipsters,unitSize,onSave,onClose}){
  const [f,setF]=useState({
    game:bet.game||"",bet:bet.bet||"",odds:String(bet.odds||""),
    stakeOverride:bet.stakeOverride!=null?String(bet.stakeOverride):"",
    result:bet.result||"pending",notes:bet.notes||"",date:bet.date||today(),
    tipster:bet.tipster||tipsters[0],taken:bet.taken!==false,nobet:bet.nobet||false,
    isParlay:bet.isParlay||false,
  });
  const [newTip,setNewTip]=useState("");
  const [localTips,setLocalTips]=useState(tipsters);

  const addLocalTip=()=>{
    if(!newTip.trim())return;
    setLocalTips([...localTips,newTip.trim()]);
    setF({...f,tipster:newTip.trim()});
    setNewTip("");

    h("div",{style:{...S.card(),width:"100%",maxWidth:520,maxHeight:"90vh",overflowY:"auto"},onClick:e=>e.stopPropagation()},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}},
        h("div",{style:{fontSize:"14px",fontWeight:700,color:"#1a1a2e"}},"✏️ Editar apuesta"),
        h("button",{onClick:onClose,style:{...S.btn("#f1f5f9","#64748b","#e2e8f0"),padding:"4px 10px"}},"✕")
      ),
      // Game
      h("div",{style:{marginBottom:10}},h("label",{style:S.lbl},"Partido"),h("input",{value:f.game,onChange:e=>setF({...f,game:e.target.value}),style:S.inp})),
      h("div",{style:{marginBottom:10}},h("label",{style:S.lbl},"Apuesta / Prop"),h("input",{value:f.bet,onChange:e=>setF({...f,bet:e.target.value}),style:S.inp})),
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}},
        h("div",null,h("label",{style:S.lbl},"Fecha"),h("input",{type:"date",value:f.date,onChange:e=>setF({...f,date:e.target.value}),style:S.inp})),
        h("div",null,h("label",{style:S.lbl},"Cuota decimal"),h("input",{type:"number",step:"0.01",min:"1",placeholder:f.nobet?"N/A (sin apuesta)":"1.85",disabled:f.nobet,value:f.nobet?"":f.odds,onChange:e=>setF({...f,odds:e.target.value}),style:{...S.inp,opacity:f.nobet?0.5:1}}))
      ),
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}},
        h("div",null,
          h("label",{style:S.lbl},"Monto apostado (COP)"),
          h("input",{type:"number",step:"500",placeholder:fmt(unitSize),disabled:f.nobet,value:f.nobet?"":f.stakeOverride,onChange:e=>setF({...f,stakeOverride:e.target.value}),style:{...S.inp,opacity:f.nobet?0.5:1}})
        ),
        h("div",null,
          h("label",{style:S.lbl},"Resultado"),
          h("div",{style:{display:"flex",gap:3}},
            ["pending","win","loss","void"].map(r=>{const rc=RC[r];const act=f.result===r;return h("button",{key:r,title:r,onClick:()=>setF({...f,result:r}),style:{flex:1,padding:"6px 2px",borderRadius:5,fontSize:"10px",cursor:"pointer",border:"1px solid "+(act?rc.border:"#e2e8f0"),background:act?rc.bg:"#f8f9fa",color:act?rc.text:"#94a3b8",fontWeight:act?700:400}},rc.emoji+" "+r.slice(0,3).toUpperCase());})
          )
        )
      ),
      // Tipster
      h("div",{style:{marginBottom:10}},
        h("label",{style:S.lbl},"Tipster"),
        h("div",{style:{display:"flex",gap:6}},
          h("select",{value:f.tipster,onChange:e=>setF({...f,tipster:e.target.value}),style:{...S.inp,flex:1}},
            localTips.map(t=>h("option",{key:t,value:t},t))
          ),
          h("input",{placeholder:"Nuevo tipster...",value:newTip,onChange:e=>setNewTip(e.target.value),onKeyDown:e=>e.key==="Enter"&&addLocalTip(),style:{...S.inp,flex:1}}),
          h("button",{onClick:addLocalTip,style:S.btn("#dbeafe","#1d4ed8","#93c5fd")},"+ ADD")
        )
      ),
      h("div",{style:{marginBottom:10}},h("label",{style:S.lbl},"Notas"),h("input",{value:f.notes,onChange:e=>setF({...f,notes:e.target.value}),style:S.inp,placeholder:"Notas adicionales..."})),
      // P&L preview
      !f.nobet&&f.odds&&+f.odds>1&&h("div",{style:{padding:"8px 12px",background:"#f0fdf4",border:"1px solid #86efac",borderRadius:6,fontSize:"11px",display:"flex",gap:16,marginBottom:10}},
        h("span",null,h("span",{style:{color:"#94a3b8"}},"Stake: "),h("span",{style:{color:"#15803d",fontWeight:700}},fmt(stake))),
        h("span",null,h("span",{style:{color:"#94a3b8"}},"Retorno potencial: "),h("span",{style:{color:"#15803d",fontWeight:700}},"+"+fmt(potWin))),
        f.result==="win"&&h("span",null,h("span",{style:{color:"#94a3b8"}},"P&L: "),h("span",{style:{color:"#15803d",fontWeight:700}},"+"+fmt(potWin))),
        f.result==="loss"&&h("span",null,h("span",{style:{color:"#94a3b8"}},"P&L: "),h("span",{style:{color:"#dc2626",fontWeight:700}},"-"+fmt(stake)))
      ),
      h("div",{style:{padding:"10px 12px",background:"#f8f9fa",borderRadius:8,display:"flex",flexDirection:"column",gap:10,marginBottom:14}},
        h(Toggle,{checked:!f.nobet&&f.taken,onChange:()=>setF({...f,taken:!f.taken,nobet:false}),color:"#2563eb",label:f.nobet?"◯ Sin apuesta (solo W%)":f.taken?"✓ Apuesta jugada — afecta P&L":"◯ Solo seguimiento — solo afecta precisión"}),
        h(Toggle,{checked:f.nobet,onChange:()=>setF({...f,nobet:!f.nobet,taken:false}),color:"#7c3aed",label:"Sin cuota / sin apuesta — solo cuenta para W%"}),
        h(Toggle,{checked:f.isParlay,onChange:()=>setF({...f,isParlay:!f.isParlay}),color:"#a16207",label:"Es combinada / parlay"})
      ),
      h("div",{style:{display:"flex",gap:8}},
        h("button",{onClick:()=>onSave({...bet,...f,odds:f.nobet?null:(+f.odds||bet.odds),stakeOverride:f.stakeOverride?+f.stakeOverride:null,tipster:f.tipster},localTips.filter(t=>!tipsters.includes(t))),style:{...S.btn("#2563eb","#fff","#2563eb"),flex:1,padding:"10px",fontSize:"13px",fontWeight:700}},"💾 Guardar cambios"),
        h("button",{onClick:onClose,style:{...S.btn("#f1f5f9","#64748b","#e2e8f0"),padding:"10px 16px"}},"Cancelar")
      )
    )
  );
}

// ── Scan prompt ────────────────────────────────────────────────────────────
const PROMPT=`You are a sports betting slip parser. Analyze this screenshot and extract ALL bets shown.
Return ONLY valid JSON (no markdown):
{
  "bets": [{
    "game": "Away Team vs Home Team",
    "bet": "full bet description with player name if prop",
    "odds": 1.85,
    "stake": 1250,
    "date": "YYYY-MM-DD",
    "isParlay": false,
    "parlayLegs": ["leg1","leg2"],
    "notes": "",
    "result": "pending"
  }],
  "sportsbook": "name if visible"
}
Convert American odds to decimal (+150=2.50,-110=1.91). stake as number without symbols. If parlay set isParlay=true and list legs. Include player names for props. Return ONLY the JSON.`;

async function scanImg(b64,mt,key){
  let resp;
  try{resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-opus-4-5-20251101",max_tokens:2000,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:mt,data:b64}},{type:"text",text:PROMPT}]}]})});}catch(fe){throw new Error("No se pudo conectar con la API. Verifica tu conexion a internet.");}
  if(!resp.ok){let em="API error "+resp.status;try{const e=await resp.json();em=e.error?.message||em;}catch{}throw new Error(em);}
  let d;try{d=await resp.json();}catch{throw new Error("Respuesta invalida del servidor.");}
  const raw=(d.content?.[0]?.text||"").trim();
  if(!raw)throw new Error("La API no devolvio contenido. Intenta con otra imagen.");
  const cleaned=raw.replace(/```json\s*/gi,"").replace(/```\s*/g,"").trim();
  const s=cleaned.indexOf("{"),e=cleaned.lastIndexOf("}");
  if(s===-1||e===-1)throw new Error("No se pudo extraer datos. Asegurate de que sea un ticket de apuestas.");
  try{return JSON.parse(cleaned.slice(s,e+1));}catch(pe){throw new Error("Error al parsear: "+pe.message);}
}
function toB64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file);});}

// ── Detected bet card (fully editable) ────────────────────────────────────
function DetectedCard({bet,tipsters,unitSize,onAdd,onAddTipster}){
  const [f,setF]=useState({
    tipster:tipsters[0]||"Claude AI",
    taken:true,nobet:false,
    result:bet.result||"pending",
    odds:String(bet.odds||""),
    stake:String(bet.stake||""),
    notes:bet.notes||"",
    newTip:"",
  });
  const [added,setAdded]=useState(false);
  const [localTips,setLocalTips]=useState(tipsters);

  const addTip=()=>{
    if(!f.newTip.trim())return;
    const t=f.newTip.trim();
    setLocalTips([...localTips,t]);
    setF({...f,tipster:t,newTip:""});
    onAddTipster(t);
  };

  const stake=f.stake?+f.stake:unitSize;
  const odds=+f.odds||1;
  const potWin=!f.nobet&&odds>1?Math.round(stake*(odds-1)):0;
  const pl=f.result==="win"?potWin:f.result==="loss"?-stake:0;

  const handle=()=>{
    onAdd({
      id:genId(),tipster:f.tipster,taken:!f.nobet&&f.taken,nobet:f.nobet,result:f.result,
      game:bet.game||"",
      bet:bet.isParlay?"PARLAY: "+(bet.parlayLegs||[]).join(" + "):(bet.bet||""),
      odds:f.nobet?null:(+f.odds||bet.odds||1.5),
      units:1,stakeOverride:f.stake?+f.stake:null,
      notes:bet.isParlay?(bet.parlayLegs||[]).join(" · ")+(f.notes?" — "+f.notes:""):(f.notes||bet.notes||""),
      date:bet.date||today(),isParlay:bet.isParlay||false,
    });
    setAdded(true);
  };

  return h("div",{style:{...S.card(),marginBottom:10,opacity:added?0.45:1,transition:"opacity 0.3s",borderLeft:"3px solid "+(added?"#86efac":"#e2e8f0")}},
    added&&h("div",{style:{fontSize:"11px",color:"#15803d",fontWeight:700,marginBottom:6}},"✓ Añadida al tracker"),
    h("div",{style:{fontSize:"10px",color:"#94a3b8",marginBottom:2}},bet.date||today()),
    h("div",{style:{fontSize:"13px",fontWeight:700,color:"#1a1a2e",marginBottom:4}},
      bet.isParlay&&h("span",{style:{...S.pill("#fef9c3","#a16207","#fde047"),marginRight:6}},"PARLAY"),
      bet.game||"Partido detectado"
    ),
    bet.isParlay
      ?h("div",{style:{marginBottom:6}},(bet.parlayLegs||[]).map((l,i)=>h("div",{key:i,style:{fontSize:"11px",color:"#64748b",padding:"2px 0"}},"  · "+l)))
      :h("div",{style:{fontSize:"12px",color:"#64748b",marginBottom:6}},bet.bet),

    // Editable fields
    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}},
      h("div",null,
        h("label",{style:S.lbl},"Cuota decimal"),
        h("input",{type:"number",step:"0.01",min:"1",placeholder:f.nobet?"Sin apuesta":"1.85",disabled:f.nobet,value:f.nobet?"":f.odds,onChange:e=>setF({...f,odds:e.target.value}),style:{...S.inp,opacity:f.nobet?0.5:1}})
      ),
      h("div",null,
        h("label",{style:S.lbl},"Monto (COP)"),
        h("input",{type:"number",step:"500",placeholder:fmt(unitSize),disabled:f.nobet,value:f.nobet?"":f.stake,onChange:e=>setF({...f,stake:e.target.value}),style:{...S.inp,opacity:f.nobet?0.5:1}})
      )
    ),
    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}},
      h("div",null,
        h("label",{style:S.lbl},"Tipster"),
        h("div",{style:{display:"flex",gap:4}},
          h("select",{value:f.tipster,onChange:e=>setF({...f,tipster:e.target.value}),style:{...S.inp,flex:1,fontSize:"11px"}},localTips.map(t=>h("option",{key:t,value:t},t))),
          h("input",{placeholder:"Nuevo...",value:f.newTip,onChange:e=>setF({...f,newTip:e.target.value}),onKeyDown:e=>e.key==="Enter"&&addTip(),style:{...S.inp,width:80,fontSize:"11px"}}),
          h("button",{onClick:addTip,style:{...S.btn("#dbeafe","#1d4ed8","#93c5fd"),padding:"4px 8px",fontSize:"10px"}},"+")
        )
      ),
      h("div",null,
        h("label",{style:S.lbl},"Resultado"),
        h("div",{style:{display:"flex",gap:2}},
          ["pending","win","loss","void"].map(r=>{const rc=RC[r];const act=f.result===r;return h("button",{key:r,title:r,onClick:()=>setF({...f,result:r}),style:{flex:1,padding:"5px 2px",borderRadius:5,fontSize:"10px",cursor:"pointer",border:"1px solid "+(act?rc.border:"#e2e8f0"),background:act?rc.bg:"#f8f9fa",color:act?rc.text:"#94a3b8",fontWeight:act?700:400}},rc.emoji);})
        )
      )
    ),
    h("div",{style:{marginBottom:8}},h("label",{style:S.lbl},"Notas"),h("input",{value:f.notes,onChange:e=>setF({...f,notes:e.target.value}),style:S.inp,placeholder:"Notas adicionales..."})),

    // P&L preview
    !f.nobet&&f.odds&&+f.odds>1&&h("div",{style:{padding:"6px 10px",background:"#f0fdf4",border:"1px solid #86efac",borderRadius:5,fontSize:"10px",display:"flex",gap:14,marginBottom:8,flexWrap:"wrap"}},
      h("span",null,h("span",{style:{color:"#94a3b8"}},"Stake: "),h("span",{style:{color:"#15803d",fontWeight:700}},fmt(stake))),
      h("span",null,h("span",{style:{color:"#94a3b8"}},"Pot. retorno: "),h("span",{style:{color:"#15803d",fontWeight:700}},"+"+fmt(potWin))),
      pl!==0&&h("span",null,h("span",{style:{color:"#94a3b8"}},"P&L: "),h("span",{style:{color:pl>0?"#15803d":"#dc2626",fontWeight:700}},(pl>0?"+":"")+fmt(pl)))
    ),

    h("div",{style:{padding:"8px 10px",background:"#f8f9fa",borderRadius:6,display:"flex",flexDirection:"column",gap:8,marginBottom:10}},
      h(Toggle,{checked:!f.nobet&&f.taken,onChange:()=>setF({...f,taken:!f.taken,nobet:false}),color:"#2563eb",label:f.nobet?"Sin apuesta":f.taken?"✓ Jugada — afecta P&L":"◯ Seguimiento — solo W%"}),
      h(Toggle,{checked:f.nobet,onChange:()=>setF({...f,nobet:!f.nobet,taken:false}),color:"#7c3aed",label:"Sin cuota / sin apuesta — solo W%"})
    ),

    h("button",{onClick:handle,disabled:added,style:{...S.btn(added?"#dcfce7":"#2563eb",added?"#15803d":"#fff",added?"#86efac":"#2563eb"),width:"100%",padding:"9px",fontWeight:700,fontSize:"12px"}},added?"✓ Añadida":"+ Añadir al tracker")
  );
}

// ── Scanner ────────────────────────────────────────────────────────────────
function Scanner({tipsters,unitSize,apiKey,onApiKeyChange,onAdd,onAddTipster}){
  const [drag,setDrag]=useState(false);
  const [scanning,setScanning]=useState(false);
  const [preview,setPreview]=useState(null);
  const [error,setError]=useState(null);
  const [detected,setDetected]=useState(null);
  const [showKey,setShowKey]=useState(false);
  const [ki,setKi]=useState(apiKey||"");

  const process=async(file)=>{

    const key=apiKey||ki;
