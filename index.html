const fmt=(n)=>new Intl.NumberFormat("es-CO",{style:"currency",currency:"COP",maximumFractionDigits:0}).format(n);
const fmtP=(n,d=1)=>(n==null||isNaN(n))?"—":n.toFixed(d)+"%";
const getStake=(b,us)=>b.stakeOverride!=null?b.stakeOverride:Math.round(b.units*us);
const calcPL=(b,result,us)=>{
  if(b.taken===false||b.nobet)return 0;
  const s=getStake(b,us);
  if(result==="win")return Math.round(s*(b.odds-1));
  if(result==="loss")return -s;
  return 0;
};

// Migration: ensure parlays have a `legs` array; parse existing text if needed
function migrateBet(b){
  if(!b)return b;
  const out={taken:true,...b};
  if(out.isParlay){
    if(!Array.isArray(out.legs)||!out.legs.length){
      // Prefer parsing from notes (uses " · " separator, safer than " + ")
      let src=(out.notes||"").trim();
      let sep=/\s*·\s*/;
      if(!src||!src.includes("·")){
        src=(out.bet||"").replace(/^PARLAY:\s*/i,"");
        sep=src.includes("·")?/\s*·\s*/:/\s*\+\s*/;
      }
      const rawLegs=src.split(sep).map(s=>s.trim()).filter(Boolean);
      out.legs=rawLegs.map(txt=>{
        const m=txt.match(/^(.*?)\s*@\s*([0-9]+(?:\.[0-9]+)?)\s*$/);
        return m?{desc:m[1].trim(),odds:+m[2],result:"pending"}:{desc:txt,odds:null,result:"pending"};
      });
    }else{
      out.legs=out.legs.map(l=>({desc:l.desc||"",odds:l.odds==null?null:+l.odds,result:l.result||"pending"}));
    }
  }
  return out;
}

// Auto-suggest parlay result from legs: all win → win; any loss → loss; any void with no loss → void if all others void/win; else pending
function suggestParlayResult(legs){
  if(!Array.isArray(legs)||!legs.length)return null;
  if(legs.some(l=>l.result==="loss"))return "loss";
  if(legs.every(l=>l.result==="win"))return "win";
  if(legs.every(l=>l.result==="win"||l.result==="void")&&legs.some(l=>l.result==="void"))return "win";
  return null;
}

// ── Leg editor (used in manual add + edit modal) ───────────────────────────
function LegsEditor({legs,setLegs,requireOdds}){
  const addLeg=()=>setLegs([...(legs||[]),{desc:"",odds:"",result:"pending"}]);
  const rmLeg=(i)=>setLegs(legs.filter((_,j)=>j!==i));
  const updLeg=(i,k,v)=>setLegs(legs.map((l,j)=>j===i?{...l,[k]:v}:l));
  return h("div",{style:{padding:"10px 12px",background:"#fffbeb",border:"1px solid #fde68a",borderRadius:8,marginTop:10}},
    h("div",{style:{fontSize:"10px",color:"#a16207",fontWeight:700,marginBottom:8,letterSpacing:"0.08em"}},"LEGS DEL PARLAY ("+(legs?.length||0)+")"),
    (!legs||!legs.length)&&h("div",{style:{fontSize:"11px",color:"#92400e",marginBottom:8}},"Añade las líneas de cada leg. Luego podrás marcar cada leg como W/L individualmente."),
    (legs||[]).map((l,i)=>h("div",{key:i,style:{display:"grid",gridTemplateColumns:"1fr 80px 30px",gap:6,marginBottom:6,alignItems:"center"}},
      h("input",{placeholder:"Leg "+(i+1)+" — p.ej. Yankees ML",value:l.desc||"",onChange:e=>updLeg(i,"desc",e.target.value),style:{...S.inp,padding:"6px 10px",fontSize:"12px"}}),
      h("input",{type:"number",step:"0.01",min:"1",placeholder:requireOdds?"1.85":"opcional",value:l.odds==null?"":l.odds,onChange:e=>updLeg(i,"odds",e.target.value),style:{...S.inp,padding:"6px 8px",fontSize:"12px",textAlign:"center"}}),
      h("button",{onClick:()=>rmLeg(i),title:"Quitar leg",style:{...S.btn("#fee2e2","#dc2626","#fca5a5"),padding:"4px 6px",fontSize:"11px"}},"✕")

  );
}

// ── Edit Modal ─────────────────────────────────────────────────────────────
function EditModal({bet,tipsters,unitSize,onSave,onClose}){
  const mb=migrateBet(bet);
  const [f,setF]=useState({
    game:mb.game||"",bet:mb.bet||"",odds:String(mb.odds||""),
    stakeOverride:mb.stakeOverride!=null?String(mb.stakeOverride):"",
    result:mb.result||"pending",notes:mb.notes||"",date:mb.date||today(),
    tipster:mb.tipster||tipsters[0],taken:mb.taken!==false,nobet:mb.nobet||false,
    isParlay:mb.isParlay||false,
    legs:mb.isParlay?(mb.legs||[]).map(l=>({...l,odds:l.odds==null?"":String(l.odds)})):[],
  });
  const [newTip,setNewTip]=useState("");
  const [localTips,setLocalTips]=useState(tipsters);

  const addLocalTip=()=>{
    if(!newTip.trim())return;
    setLocalTips([...localTips,newTip.trim()]);
    setF({...f,tipster:newTip.trim()});
    setNewTip("");
  };

  const stake=f.stakeOverride?+f.stakeOverride:unitSize;
  const potWin=f.odds&&+f.odds>1?Math.round(stake*((+f.odds)-1)):0;

  // Auto-suggest parlay result from legs
  const legsForSuggest=f.legs.map(l=>({...l,odds:l.odds===""?null:+l.odds}));
  const suggestion=f.isParlay?suggestParlayResult(legsForSuggest):null;
  const applySuggestion=()=>{if(suggestion)setF({...f,result:suggestion});};

  const save=()=>{
    const cleanLegs=f.legs.map(l=>({desc:(l.desc||"").trim(),odds:l.odds===""||l.odds==null?null:+l.odds,result:l.result||"pending"})).filter(l=>l.desc||l.odds!=null);
    const out={...bet,...f,
      odds:f.nobet?null:(+f.odds||bet.odds),
      stakeOverride:f.stakeOverride?+f.stakeOverride:null,
      tipster:f.tipster,
      legs:f.isParlay?cleanLegs:null,
    };
    // Keep bet text in sync for parlays
    if(f.isParlay&&cleanLegs.length){
      const joined=cleanLegs.map(l=>l.desc+(l.odds!=null?" @ "+l.odds:"")).join(" + ");
      out.bet="PARLAY: "+joined;
    }
    onSave(out,localTips.filter(t=>!tipsters.includes(t)));
  };

  return h("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16},onClick:onClose},
    h("div",{style:{...S.card(),width:"100%",maxWidth:560,maxHeight:"92vh",overflowY:"auto"},onClick:e=>e.stopPropagation()},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}},
        h("div",{style:{fontSize:"14px",fontWeight:700,color:"#1a1a2e"}},"✏️ Editar apuesta"),
        h("button",{onClick:onClose,style:{...S.btn("#f1f5f9","#64748b","#e2e8f0"),padding:"4px 10px"}},"✕")
      ),
      h("div",{style:{marginBottom:10}},h("label",{style:S.lbl},"Partido"),h("input",{value:f.game,onChange:e=>setF({...f,game:e.target.value}),style:S.inp})),
      h("div",{style:{marginBottom:10}},h("label",{style:S.lbl},f.isParlay?"Título / Descripción del parlay":"Apuesta / Prop"),h("input",{value:f.bet,onChange:e=>setF({...f,bet:e.target.value}),style:S.inp})),
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}},
        h("div",null,h("label",{style:S.lbl},"Fecha"),h("input",{type:"date",value:f.date,onChange:e=>setF({...f,date:e.target.value}),style:S.inp})),
        h("div",null,h("label",{style:S.lbl},f.isParlay?"Cuota total del parlay":"Cuota decimal"),h("input",{type:"number",step:"0.01",min:"1",placeholder:f.nobet?"N/A":"1.85",disabled:f.nobet,value:f.nobet?"":f.odds,onChange:e=>setF({...f,odds:e.target.value}),style:{...S.inp,opacity:f.nobet?0.5:1}}))
      ),
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}},
        h("div",null,
          h("label",{style:S.lbl},"Monto apostado (COP)"),
          h("input",{type:"number",step:"500",placeholder:fmt(unitSize),disabled:f.nobet,value:f.nobet?"":f.stakeOverride,onChange:e=>setF({...f,stakeOverride:e.target.value}),style:{...S.inp,opacity:f.nobet?0.5:1}})
        ),
        h("div",null,
          h("label",{style:S.lbl},f.isParlay?"Resultado total del parlay":"Resultado"),
          h("div",{style:{display:"flex",gap:3}},
            ["pending","win","loss","void"].map(r=>{const rc=RC[r];const act=f.result===r;return h("button",{key:r,title:r,onClick:()=>setF({...f,result:r}),style:{flex:1,padding:"6px 2px",borderRadius:5,fontSize:"10px",cursor:"pointer",border:"1px solid "+(act?rc.border:"#e2e8f0"),background:act?rc.bg:"#f8f9fa",color:act?rc.text:"#94a3b8",fontWeight:act?700:400}},rc.emoji+" "+r.slice(0,3).toUpperCase());})
          )
        )
      ),
      // Tipster
      h("div",{style:{marginBottom:10}},
        h("label",{style:S.lbl},"Tipster"),
        h("div",{style:{display:"flex",gap:6,flexWrap:"wrap"}},
          h("select",{value:f.tipster,onChange:e=>setF({...f,tipster:e.target.value}),style:{...S.inp,flex:"1 1 140px"}},
            localTips.map(t=>h("option",{key:t,value:t},t))
          ),
          h("input",{placeholder:"Nuevo tipster...",value:newTip,onChange:e=>setNewTip(e.target.value),onKeyDown:e=>e.key==="Enter"&&addLocalTip(),style:{...S.inp,flex:"1 1 140px"}}),
          h("button",{onClick:addLocalTip,style:S.btn("#dbeafe","#1d4ed8","#93c5fd")},"+ ADD")
        )
      ),
      h("div",{style:{marginBottom:10}},h("label",{style:S.lbl},"Notas"),h("input",{value:f.notes,onChange:e=>setF({...f,notes:e.target.value}),style:S.inp,placeholder:"Notas adicionales..."})),
      !f.nobet&&f.odds&&+f.odds>1&&h("div",{style:{padding:"8px 12px",background:"#f0fdf4",border:"1px solid #86efac",borderRadius:6,fontSize:"11px",display:"flex",gap:16,marginBottom:10,flexWrap:"wrap"}},
        h("span",null,h("span",{style:{color:"#94a3b8"}},"Stake: "),h("span",{style:{color:"#15803d",fontWeight:700}},fmt(stake))),
        h("span",null,h("span",{style:{color:"#94a3b8"}},"Retorno potencial: "),h("span",{style:{color:"#15803d",fontWeight:700}},"+"+fmt(potWin))),
        f.result==="win"&&h("span",null,h("span",{style:{color:"#94a3b8"}},"P&L: "),h("span",{style:{color:"#15803d",fontWeight:700}},"+"+fmt(potWin))),
        f.result==="loss"&&h("span",null,h("span",{style:{color:"#94a3b8"}},"P&L: "),h("span",{style:{color:"#dc2626",fontWeight:700}},"-"+fmt(stake)))
      ),
      h("div",{style:{padding:"10px 12px",background:"#f8f9fa",borderRadius:8,display:"flex",flexDirection:"column",gap:10,marginBottom:14}},
        h(Toggle,{checked:!f.nobet&&f.taken,onChange:()=>setF({...f,taken:!f.taken,nobet:false}),color:"#2563eb",label:f.nobet?"◯ Sin apuesta (solo W%)":f.taken?"✓ Apuesta jugada — afecta P&L":"◯ Solo seguimiento — solo afecta precisión"}),
        h(Toggle,{checked:f.nobet,onChange:()=>setF({...f,nobet:!f.nobet,taken:false}),color:"#7c3aed",label:"Sin cuota / sin apuesta — solo cuenta para W%"}),
        h(Toggle,{checked:f.isParlay,onChange:()=>setF({...f,isParlay:!f.isParlay,legs:!f.isParlay&&f.legs.length===0?[{desc:"",odds:"",result:"pending"},{desc:"",odds:"",result:"pending"}]:f.legs}),color:"#a16207",label:"Es combinada / parlay"})
      ),
      f.isParlay&&h(LegsEditor,{legs:f.legs,setLegs:(L)=>setF({...f,legs:L}),requireOdds:!f.nobet}),
      // Per-leg results
      f.isParlay&&f.legs.length>0&&h("div",{style:{padding:"10px 12px",background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:8,marginTop:10}},
        h("div",{style:{fontSize:"10px",color:"#64748b",fontWeight:700,marginBottom:8,letterSpacing:"0.08em",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6}},
          h("span",null,"RESULTADO DE CADA LEG (cuenta para Win %)"),
          suggestion&&suggestion!==f.result&&h("button",{onClick:applySuggestion,style:{...S.btn("#eff6ff","#1d4ed8","#93c5fd"),padding:"3px 8px",fontSize:"10px"}},"💡 Sugerencia: "+suggestion.toUpperCase())
        ),
        f.legs.map((l,i)=>h("div",{key:i,style:{display:"flex",gap:6,alignItems:"center",marginBottom:6,flexWrap:"wrap"}},
          h("span",{style:{fontSize:"11px",color:"#64748b",flex:"1 1 160px",minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},(l.desc||"(leg "+(i+1)+")")+(l.odds?" @ "+l.odds:"")),
          h("div",{style:{display:"flex",gap:2}},
            ["pending","win","loss","void"].map(r=>{const rc=RC[r];const act=(l.result||"pending")===r;return h("button",{key:r,title:r,onClick:()=>setF({...f,legs:f.legs.map((ll,j)=>j===i?{...ll,result:r}:ll)}),style:{padding:"4px 8px",borderRadius:5,fontSize:"10px",cursor:"pointer",border:"1px solid "+(act?rc.border:"#e2e8f0"),background:act?rc.bg:"#fff",color:act?rc.text:"#94a3b8",fontWeight:act?700:400}},rc.emoji);})
          )
        ))
      ),
      h("div",{style:{display:"flex",gap:8,marginTop:14}},
        h("button",{onClick:save,style:{...S.btn("#2563eb","#fff","#2563eb"),flex:1,padding:"10px",fontSize:"13px",fontWeight:700}},"💾 Guardar cambios"),
        h("button",{onClick:onClose,style:{...S.btn("#f1f5f9","#64748b","#e2e8f0"),padding:"10px 16px"}},"Cancelar")
      )
    )
  );
}

// ── Scan prompt ────────────────────────────────────────────────────────────
const PROMPT=`You are a sports betting slip parser. Analyze the screenshot(s) and extract ALL bets shown across all images.
Return ONLY valid JSON (no markdown, no commentary):
{
  "bets": [{
    "game": "Away Team vs Home Team",
    "bet": "full bet description with player name if prop",
    "odds": 1.85,
    "stake": 1250,
    "date": "YYYY-MM-DD",
    "isParlay": false,
    "parlayLegs": [{"desc":"Leg description with line (e.g. Yankees -1.5)", "odds": 1.95}],
    "notes": "",
    "result": "pending"
  }],
  "sportsbook": "name if visible"
}
Rules:
- Convert American odds to decimal (+150=2.50, -110=1.91).
- "stake" is a number without symbols.
- If the bet is a parlay/combinada/multiple, set isParlay=true and populate parlayLegs with one entry per leg, each containing the leg's description (including line/spread/total) AND its individual decimal odds.
- The top-level "odds" field for a parlay is the COMBINED parlay odds.
- Include player names for props.
- If multiple images show the same bet, only include it once.
- If the user provides additional instructions below, follow them.
Return ONLY the JSON.`;

async function scanImages(imgs,key,instructions){
  const content=imgs.map(({b64,mt})=>({type:"image",source:{type:"base64",media_type:mt,data:b64}}));
  const fullPrompt=PROMPT+(instructions&&instructions.trim()?"\n\nUSER INSTRUCTIONS:\n"+instructions.trim():"");
  content.push({type:"text",text:fullPrompt});
  let resp;
  try{resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-opus-4-5-20251101",max_tokens:3000,messages:[{role:"user",content}]})});}catch(fe){throw new Error("No se pudo conectar con la API. Verifica tu conexión a internet.");}
  if(!resp.ok){let em="API error "+resp.status;try{const e=await resp.json();em=e.error?.message||em;}catch{}throw new Error(em);}
  let d;try{d=await resp.json();}catch{throw new Error("Respuesta inválida del servidor.");}
  const raw=(d.content?.[0]?.text||"").trim();
  if(!raw)throw new Error("La API no devolvió contenido. Intenta con otra imagen.");
  const cleaned=raw.replace(/```json\s*/gi,"").replace(/```\s*/g,"").trim();
  const s=cleaned.indexOf("{"),e=cleaned.lastIndexOf("}");
  if(s===-1||e===-1)throw new Error("No se pudo extraer datos. Asegúrate de que sea un ticket de apuestas.");
  try{return JSON.parse(cleaned.slice(s,e+1));}catch(pe){throw new Error("Error al parsear: "+pe.message);}
}
function toB64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>{const result=r.result||"";const parts=result.split(",");res(parts.length>1?parts[1]:result);};r.onerror=rej;r.readAsDataURL(file);});}

// Normalize parlayLegs from scanner — handle both string[] and {desc,odds}[] shapes
function normalizeScannedLegs(rawLegs){
  if(!Array.isArray(rawLegs))return [];
  return rawLegs.map(l=>{
    if(typeof l==="string"){
      const m=l.match(/^(.*?)\s*@\s*([0-9]+(?:\.[0-9]+)?)\s*$/);
      return m?{desc:m[1].trim(),odds:+m[2],result:"pending"}:{desc:l.trim(),odds:null,result:"pending"};
    }
    return {desc:(l.desc||l.description||l.leg||"").trim(),odds:l.odds==null?null:+l.odds,result:l.result||"pending"};
  }).filter(l=>l.desc||l.odds!=null);
}

// ── Scanner (multi-image + instructions) ───────────────────────────────────
function Scanner({tipsters,unitSize,apiKey,onApiKeyChange,onAdd,onAddTipster}){
  const MAX_IMG=5;
  const [drag,setDrag]=useState(false);
  const [scanning,setScanning]=useState(false);
  const [files,setFiles]=useState([]); // [{file, url}]
  const [error,setError]=useState(null);

  const [showKey,setShowKey]=useState(false);
  const [ki,setKi]=useState(apiKey||"");
  const [instructions,setInstructions]=useState("");
  const fileInputRef=useRef(null);

  // Cleanup object URLs
  useEffect(()=>()=>{files.forEach(f=>{try{URL.revokeObjectURL(f.url);}catch{}});},[]);

  const addFiles=(list)=>{
    const incoming=Array.from(list||[]).filter(f=>f.type.startsWith("image/")||/\.(png|jpg|jpeg|webp|gif|bmp)$/i.test(f.name));
    if(!incoming.length){setError("Solo se aceptan imágenes PNG, JPG o WEBP.");return;}
    setError(null);
    const room=MAX_IMG-files.length;
    if(room<=0){setError("Máximo "+MAX_IMG+" screenshots a la vez.");return;}
    const toAdd=incoming.slice(0,room).map(file=>({file,url:URL.createObjectURL(file)}));
    if(incoming.length>room)setError("Solo se añadieron las primeras "+room+" imágenes (límite "+MAX_IMG+").");
    setFiles([...files,...toAdd]);
  };

  const removeFile=(i)=>{const f=files[i];if(f){try{URL.revokeObjectURL(f.url);}catch{}}setFiles(files.filter((_,j)=>j!==i));};

  const clearAll=()=>{files.forEach(f=>{try{URL.revokeObjectURL(f.url);}catch{}});setFiles([]);setDetected(null);setError(null);};

  const runScan=async()=>{
    if(!files.length){setError("Añade al menos una imagen.");return;}
    const key=apiKey||ki;
    if(!key){setShowKey(true);setError("Configura tu API key primero.");return;}
    setError(null);setDetected(null);setScanning(true);
    try{
      const imgs=await Promise.all(files.map(async({file})=>{
        const b64=await toB64(file);
        const mt=file.type||(/\.png$/i.test(file.name)?"image/png":/\.(jpg|jpeg)$/i.test(file.name)?"image/jpeg":"image/png");
        return {b64,mt};
      }));
      const r=await scanImages(imgs,key,instructions);
      setDetected(r);
    }catch(e){setError(e?.message||String(e)||"Error desconocido. Intenta de nuevo.");}
    finally{setScanning(false);}
  };

  return h("div",null,
    h("div",{style:{...S.card("#dbeafe"),marginBottom:14,borderColor:"#93c5fd"}},
      h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}},

          h("div",{style:{fontSize:"10px",color:"#64748b"}},apiKey?"✓ Key configurada — escáner listo":"Requerida para escanear screenshots")
        ),
        h("button",{onClick:()=>setShowKey(!showKey),style:S.btn("#fff","#1d4ed8","#93c5fd")},showKey?"Cerrar":"Configurar")
      ),
      showKey&&h("div",{style:{marginTop:10,display:"flex",gap:8}},
        h("input",{type:"password",placeholder:"sk-ant-...",value:ki,onChange:e=>setKi(e.target.value),onKeyDown:e=>{if(e.key==="Enter"){onApiKeyChange(ki);setShowKey(false);}},style:{...S.inp,flex:1}}),
        h("button",{onClick:()=>{onApiKeyChange(ki);setShowKey(false);},style:S.btn("#2563eb","#fff","#2563eb")},"GUARDAR")
      ),
      h("div",{style:{fontSize:"9px",color:"#94a3b8",marginTop:6}},"Guardada en tu navegador · console.anthropic.com → API Keys")
    ),

    h("div",{className:"drop-zone"+(drag?" dragging":""),
      onClick:()=>fileInputRef.current&&fileInputRef.current.click(),
      onDrop:(e)=>{e.preventDefault();setDrag(false);addFiles(e.dataTransfer.files);},
      onDragOver:(e)=>{e.preventDefault();setDrag(true);},
      onDragLeave:()=>setDrag(false),
      style:{display:"block"}
    },
      h("input",{ref:fileInputRef,type:"file",accept:"image/*",multiple:true,style:{display:"none"},onChange:e=>{addFiles(e.target.files);e.target.value="";}}),
      h("div",{style:{fontSize:"36px",marginBottom:10}},"📸"),
      h("div",{style:{color:"#64748b",fontWeight:600,marginBottom:6}},"Arrastra hasta "+MAX_IMG+" screenshots aquí"),
      h("div",{style:{color:"#94a3b8",fontSize:"11px",marginBottom:8}},"o haz clic para seleccionar — se procesan TODAS en una sola llamada"),
      h("div",{style:{fontSize:"10px",color:"#cbd5e1"}},"PNG · JPG · WEBP · cualquier casa de apuestas")
    ),

    files.length>0&&h("div",{className:"thumb-grid"},

      ))

    files.length>0&&h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:8,fontSize:"11px",color:"#64748b"}},

    ),

      h("div",{style:{...S.stitle,marginBottom:10}},h("span",{style:S.dot("#15803d")}),detected.bets.length+" apuesta"+(detected.bets.length>1?"s":"")+" detectada"+(detected.bets.length>1?"s":""),(detected.sportsbook&&h("span",{style:{color:"#94a3b8",fontSize:"10px",marginLeft:8}},"· "+detected.sportsbook))),
      h("div",{style:{fontSize:"10px",color:"#64748b",marginBottom:10,padding:"8px 12px",background:"#eff6ff",border:"1px solid #93c5fd",borderRadius:6}},"👇 Revisa y edita cada apuesta antes de añadirla. Para parlays, puedes editar las líneas y odds de cada leg, y marcar W/L individualmente."),
      detected.bets.map((b,i)=>h(DetectedCard,{key:i,bet:b,tipsters,unitSize,onAdd,onAddTipster}))
    )
  );
}

      ),

        h("div",{style:{display:"flex",gap:2}},

        )
      )),
      h("div",{style:{fontSize:"10px",color:"#92400e",marginTop:4,fontStyle:"italic"}},"P&L solo se calcula del resultado total del parlay (arriba). Los legs solo cuentan para Win %.")
    )
  );
}

function KPI({label,value,sub,green,red,blue,purple}){
  const col=green?"#15803d":red?"#dc2626":blue?"#1d4ed8":purple?"#7c3aed":"#1a1a2e";
  const bd=green?"#86efac":red?"#fca5a5":blue?"#93c5fd":purple?"#c4b5fd":"#e2e8f0";
  const bg=green?"#f0fdf4":red?"#fff1f2":blue?"#eff6ff":purple?"#faf5ff":"#fff";
  return h("div",{style:{background:bg,border:"1px solid "+bd,borderRadius:10,padding:"12px 14px",boxShadow:"0 1px 3px rgba(0,0,0,0.05)"}},
    h("div",{style:{fontSize:"9px",color:"#94a3b8",letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:5,fontWeight:600}},label),
    h("div",{style:{fontSize:"20px",fontWeight:700,color:col,lineHeight:1.2}},value),
    h("div",{style:{fontSize:"10px",color:"#94a3b8",marginTop:3}},sub)
  );
}

// ── App ────────────────────────────────────────────────────────────────────
function App(){
  const [bets,setBets]=useState([]);
  const [unitSize,setUS]=useState(5000);
  const [tipsters,setTips]=useState(TIPS_DEFAULT);
  const [view,setView]=useState("dashboard");
  const [tUrls,setTU]=useState({});
  const [fTip,setFT]=useState("All");
  const [fRes,setFR]=useState("All");
  const [fTak,setFK]=useState("All");
  const [editUnit,setEU]=useState(false);
  const [uIn,setUI]=useState("5000");
  const [newTip,setNT]=useState("");
  const [loaded,setLoaded]=useState(false);
  const [toast,setToast]=useState(null);
  const [lTab,setLT]=useState("pl");
  const [apiKey,setAK]=useState("");
  const [mode,setMode]=useState("manual");
  const [editingBet,setEB]=useState(null);
  const tt=useRef();

  const ef=()=>({tipster:tipsters[0]||"Claude AI",game:"",bet:"",odds:"",units:"1",stakeOverride:"",result:"pending",notes:"",date:today(),isParlay:false,taken:true,nobet:false,legs:[]});
  const [form,setForm]=useState(ef());

  useEffect(()=>{
    const b=LS.get("mlbt_v5"),u=LS.get("mlbt_u5"),t=LS.get("mlbt_t5"),k=LS.get("mlbt_k5"),tu=LS.get("mlbt_urls");
    if(b)setBets(b.map(migrateBet));
    if(u){setUS(u);setUI(String(u));}
    if(t)setTips(t);
    if(k)setAK(k);
    if(tu&&typeof tu==="object")setTU(tu);
    setLoaded(true);
  },[]);

  const showT=(msg,type="ok")=>{setToast({msg,type});clearTimeout(tt.current);tt.current=setTimeout(()=>setToast(null),3000);};
  const savB=(b)=>{setBets(b);LS.set("mlbt_v5",b);};
  const savU=(u)=>{setUS(u);LS.set("mlbt_u5",u);};
  const savT=(t)=>{setTips(t);LS.set("mlbt_t5",t);};
  const savK=(k)=>{setAK(k);LS.set("mlbt_k5",k);};
  const savTU=(tu)=>{setTU(tu);LS.set("mlbt_urls",tu);};

  const updR=(id,r)=>savB(bets.map(b=>b.id===id?{...b,result:r}:b));
  const updLegR=(id,idx,r)=>savB(bets.map(b=>{
    if(b.id!==id||!Array.isArray(b.legs))return b;
    const newLegs=b.legs.map((l,i)=>i===idx?{...l,result:r}:l);
    return {...b,legs:newLegs};
  }));
  const togT=(id)=>savB(bets.map(b=>b.id===id?{...b,taken:!(b.taken!==false)}:b));
  const delB=(id)=>{savB(bets.filter(b=>b.id!==id));showT("Eliminada","warn");};

  const addBet=()=>{
    if(!form.game||!form.bet){showT("Completa partido y apuesta","err");return;}
    if(!form.nobet&&!form.odds){showT("Ingresa la cuota","err");return;}
    const cleanLegs=form.isParlay?form.legs.map(l=>({desc:(l.desc||"").trim(),odds:l.odds===""||l.odds==null?null:+l.odds,result:l.result||"pending"})).filter(l=>l.desc||l.odds!=null):null;
    const nb={...form,id:genId(),odds:form.nobet?null:(+form.odds||null),units:+form.units,stakeOverride:form.stakeOverride?+form.stakeOverride:null,legs:cleanLegs};
    if(form.isParlay&&cleanLegs&&cleanLegs.length){
      const joined=cleanLegs.map(l=>l.desc+(l.odds!=null?" @ "+l.odds:"")).join(" + ");
      if(!nb.bet||/^PARLAY:/i.test(nb.bet))nb.bet="PARLAY: "+joined;
    }
    savB([nb,...bets]);setForm(ef());showT("Apuesta registrada ✓");setView("bets");
  };

  const onDetected=(bet)=>{savB([migrateBet(bet),...bets]);showT("Apuesta añadida ✓");};
  const addExtraTip=(t)=>{if(!tipsters.includes(t)){const u=[...tipsters,t];savT(u);}};

  const saveEdit=(updated,newTips)=>{
    if(newTips&&newTips.length){const u=[...new Set([...tipsters,...newTips])];savT(u);}
    savB(bets.map(b=>b.id===updated.id?migrateBet(updated):b));
    setEB(null);showT("Guardado ✓");
  };

  const saveUnit=()=>{const v=+uIn;if(v>0){savU(v);showT("Unidad actualizada");}setEU(false);};
  const addTip=()=>{if(!newTip.trim())return;if(tipsters.includes(newTip.trim())){showT("Ya existe","err");return;}const u=[...tipsters,newTip.trim()];savT(u);setNT("");showT("Tipster añadido ✓");};
  const remTip=(n)=>{if(bets.some(b=>b.tipster===n)){showT("Tiene apuestas asociadas","err");return;}savT(tipsters.filter(t=>t!==n));};

  // ── Stats: Win Rate counts INDIVIDUAL LEGS for parlays with leg results ─
  // P&L always uses parlay-level result (legs only affect win %).
  const stats=(()=>{
    const tb=bets.filter(b=>b.taken!==false&&!b.nobet);
    const tpl=bets.reduce((a,b)=>a+calcPL(b,b.result,unitSize),0);

    // Build leg-aware win/loss arrays
    // For each bet:
    //   - if isParlay && legs has any decided result, contribute one entry per decided leg
    //   - else, contribute the bet's own decided result (not pending/void)
    function contributions(b){
      if(b.isParlay&&Array.isArray(b.legs)&&b.legs.some(l=>l.result==="win"||l.result==="loss")){
        return b.legs.filter(l=>l.result==="win"||l.result==="loss").map(l=>({result:l.result,taken:b.taken!==false&&!b.nobet}));
      }
      if(b.result==="win"||b.result==="loss")return [{result:b.result,taken:b.taken!==false&&!b.nobet}];
      return [];
    }

    // Accuracy across ALL picks (including non-taken)
    let aw=0,al=0;
    bets.forEach(b=>contributions(b).forEach(c=>{if(c.result==="win")aw++;else al++;}));

    // Win rate across TAKEN picks only
    let tw=0,tl=0;
    tb.forEach(b=>contributions(b).forEach(c=>{if(c.taken){if(c.result==="win")tw++;else tl++;}}));

    const ts2Count=tw+tl;
    const asCount=aw+al;
    const tsk=tb.reduce((a,b)=>(b.result!=="pending"&&b.result!=="void")?a+getStake(b,unitSize):a,0);
    const roi=tsk>0?tpl/tsk*100:0;
    const pend=bets.filter(b=>b.result==="pending");
    const pot=pend.filter(b=>b.taken!==false&&!b.nobet).reduce((a,b)=>a+getStake(b,unitSize)*b.odds,0);

    // Per-tipster stats with leg-aware win rate
    const byT=tipsters.map(t=>{
      const all=bets.filter(b=>b.tipster===t);if(!all.length)return null;
      const tak=all.filter(b=>b.taken!==false&&!b.nobet);
      let aw2=0,al2=0,tw2=0,tl2=0;
      all.forEach(b=>contributions(b).forEach(c=>{if(c.result==="win")aw2++;else al2++;}));
      tak.forEach(b=>contributions(b).forEach(c=>{if(c.taken){if(c.result==="win")tw2++;else tl2++;}}));
      const pl=tak.reduce((a,b)=>a+calcPL(b,b.result,unitSize),0);
      const sk=tak.reduce((a,b)=>(b.result!=="pending"&&b.result!=="void")?a+getStake(b,unitSize):a,0);
      const as2=aw2+al2,ts3=tw2+tl2;
      return {name:t,total:all.length,tak:tak.length,pl,sk,roi:sk>0?pl/sk*100:0,
        acc:as2>0?aw2/as2*100:null,wr:ts3>0?tw2/ts3*100:null};
    }).filter(Boolean);

    return {tpl,roi,tw,tl,aw,al,as:asCount,
      acc:asCount>0?aw/asCount*100:null,wr:ts2Count>0?tw/ts2Count*100:null,
      pend:pend.length,pot,total:bets.length,tak:tb.length,ntk:bets.filter(b=>b.taken===false).length,
      nobet:bets.filter(b=>b.nobet).length,tsk,byT};
  })();

  const fil=bets.filter(b=>(fTip==="All"||b.tipster===fTip)&&(fRes==="All"||b.result===fRes)&&(fTak==="All"||(fTak==="taken"?b.taken!==false&&!b.nobet:fTak==="nobet"?b.nobet:b.taken===false)));
  const byD=fil.reduce((a,b)=>{(a[b.date]=a[b.date]||[]).push(b);return a;},{});
  const dts=Object.keys(byD).sort((a,b)=>b.localeCompare(a));

  // ── Backup exports ────────────────────────────────────────────────────────
  function exportJSON(){
    const d=JSON.stringify({bets,unitSize,tipsters,tipsterUrls:tUrls,exportedAt:new Date().toISOString(),version:"v5-legs"},null,2);
    const a=document.createElement("a");

    showT("Backup JSON descargado ✓");
  }
  function exportXLSX(){
    if(typeof XLSX==="undefined"){showT("La librería XLSX no se cargó. Verifica tu conexión.","err");return;}
    const wb=XLSX.utils.book_new();
    // Sheet 1: All Bets
    const mainRows=bets.map(b=>{
      const stake=b.taken!==false&&!b.nobet?getStake(b,unitSize):0;
      const pl=calcPL(b,b.result,unitSize);
      const legCount=b.isParlay&&Array.isArray(b.legs)?b.legs.length:0;
      const legW=b.isParlay&&Array.isArray(b.legs)?b.legs.filter(l=>l.result==="win").length:0;
      const legL=b.isParlay&&Array.isArray(b.legs)?b.legs.filter(l=>l.result==="loss").length:0;
      return {
        ID:b.id,Date:b.date||"",Tipster:b.tipster||"",
        Game:b.game||"",Bet:b.bet||"",
        Type:b.isParlay?"Parlay":"Single",
        Mode:b.nobet?"Win% only":(b.taken===false?"Tracking":"Played"),
        Odds:b.odds||"",
        StakeCOP:stake,PL_COP:pl,Result:b.result||"pending",
        ParlayLegs:legCount,LegsWon:legW,LegsLost:legL,
        Notes:b.notes||""
      };
    });
    const wsMain=XLSX.utils.json_to_sheet(mainRows);
    wsMain["!cols"]=[{wch:10},{wch:12},{wch:14},{wch:36},{wch:48},{wch:9},{wch:11},{wch:7},{wch:11},{wch:11},{wch:9},{wch:10},{wch:10},{wch:10},{wch:30}];
    XLSX.utils.book_append_sheet(wb,wsMain,"All Bets");

    // Sheet 2: Parlay Legs
    const legRows=[];
    bets.filter(b=>b.isParlay&&Array.isArray(b.legs)).forEach(b=>{
      b.legs.forEach((l,i)=>legRows.push({
        ParlayID:b.id,Date:b.date||"",Tipster:b.tipster||"",Game:b.game||"",
        ParlayResult:b.result||"pending",
        LegNum:i+1,LegDescription:l.desc||"",LegOdds:l.odds||"",LegResult:l.result||"pending"
      }));
    });
    if(legRows.length){
      const wsLegs=XLSX.utils.json_to_sheet(legRows);
      wsLegs["!cols"]=[{wch:10},{wch:12},{wch:14},{wch:36},{wch:13},{wch:7},{wch:48},{wch:9},{wch:11}];
      XLSX.utils.book_append_sheet(wb,wsLegs,"Parlay Legs");
    }

    // Sheet 3: Tipsters
    const tipRows=stats.byT.map(t=>({
      Tipster:t.name,TotalPicks:t.total,Played:t.tak,
      Accuracy_pct:t.acc==null?"":Math.round(t.acc*10)/10,
      WinRate_pct:t.wr==null?"":Math.round(t.wr*10)/10,
      PL_COP:t.pl,Staked_COP:t.sk,
      ROI_pct:t.sk?Math.round(t.roi*10)/10:""
    }));
    if(tipRows.length){
      const wsTips=XLSX.utils.json_to_sheet(tipRows);
      wsTips["!cols"]=[{wch:18},{wch:11},{wch:9},{wch:12},{wch:12},{wch:11},{wch:12},{wch:9}];
      XLSX.utils.book_append_sheet(wb,wsTips,"Tipsters");
    }

    // Sheet 4: Summary
    const sumRows=[
      {Metric:"Backup generated",Value:new Date().toLocaleString("es-CO")},
      {Metric:"Unit size (COP)",Value:unitSize},
      {Metric:"Total bets",Value:bets.length},
      {Metric:"Played (taken)",Value:stats.tak},
      {Metric:"Tracking only",Value:stats.ntk},
      {Metric:"Win% only (no odds)",Value:stats.nobet},
      {Metric:"Pending",Value:stats.pend},
      {Metric:"P&L total (COP)",Value:stats.tpl},
      {Metric:"Staked (COP)",Value:stats.tsk},
      {Metric:"ROI %",Value:stats.tsk?Math.round(stats.roi*10)/10:""},
      {Metric:"Win rate % (legs counted)",Value:stats.wr==null?"":Math.round(stats.wr*10)/10},
      {Metric:"Accuracy % (legs counted)",Value:stats.acc==null?"":Math.round(stats.acc*10)/10},
      {Metric:"Wins (taken, leg-counted)",Value:stats.tw},
      {Metric:"Losses (taken, leg-counted)",Value:stats.tl}
    ];
    const wsSum=XLSX.utils.json_to_sheet(sumRows);
    wsSum["!cols"]=[{wch:32},{wch:24}];
    XLSX.utils.book_append_sheet(wb,wsSum,"Summary");

    const fname="mlb-bets-backup-"+today()+".xlsx";
    XLSX.writeFile(wb,fname);
    showT("Backup Excel descargado ✓");
  }

  if(!loaded)return h("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"#f8f9fa"}},h("span",{style:{color:"#2563eb",fontSize:"14px",fontWeight:700}},"Cargando..."));

  const NB=(label,v,cnt)=>h("button",{key:v,onClick:()=>setView(v),style:{padding:"7px 14px",borderRadius:6,border:"1px solid "+(view===v?"#2563eb":"#e2e8f0"),background:view===v?"#2563eb":"#fff",color:view===v?"#fff":"#64748b",cursor:"pointer",fontSize:"11px",letterSpacing:"0.04em",fontWeight:view===v?700:500,boxShadow:view===v?"0 1px 3px rgba(37,99,235,0.3)":"none"}},label+(cnt!=null?` (${cnt})`:""));
  const Ch=(label,val,cur,setter)=>h("button",{key:val,onClick:()=>setter(val),style:{padding:"3px 10px",borderRadius:20,border:"1px solid "+(cur===val?"#2563eb":"#e2e8f0"),background:cur===val?"#eff6ff":"#fff",color:cur===val?"#1d4ed8":"#64748b",cursor:"pointer",fontSize:"10px",fontWeight:cur===val?700:400}},label);
  const TB=(label,val)=>h("button",{onClick:()=>setLT(val),style:{padding:"4px 12px",borderRadius:6,border:"1px solid "+(lTab===val?"#2563eb":"#e2e8f0"),background:lTab===val?"#eff6ff":"#fff",color:lTab===val?"#1d4ed8":"#64748b",cursor:"pointer",fontSize:"10px",fontFamily:"inherit",fontWeight:lTab===val?700:400}},label);

  return h("div",{style:{minHeight:"100vh",background:"#f8f9fa",color:"#1a1a2e"}},

    h("div",{style:{borderBottom:"1px solid #e2e8f0",padding:"14px 20px",background:"#fff",position:"sticky",top:0,zIndex:50,display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8,boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}},
      h("div",null,
        h("div",{style:{fontSize:"16px",fontWeight:800,color:"#1a1a2e",letterSpacing:"-0.02em"}},"⚾ MLB ",h("span",{style:{color:"#2563eb"}},"TRACKER")),
        h("div",{style:{fontSize:"9px",color:"#94a3b8",letterSpacing:"0.1em",marginTop:2,fontWeight:600}},"P&L EN PESOS COLOMBIANOS")
      ),
      h("div",{style:{display:"flex",gap:6,flexWrap:"wrap"}},NB("DASHBOARD","dashboard"),NB("APUESTAS","bets",bets.length),NB("⏳ PENDIENTES","pending",stats.pend),NB("TIPSTERS","tipsters",tipsters.length),NB("+ NUEVA","add"),NB("⚙","settings"))
    ),

    h("div",{style:{padding:"20px",maxWidth:960,margin:"0 auto"}},

      view==="dashboard"&&h(React.Fragment,null,
        h("div",{style:{fontSize:"9px",color:"#94a3b8",letterSpacing:"0.1em",marginBottom:8,display:"flex",alignItems:"center",gap:6,fontWeight:600}},h("span",{style:S.dot("#15803d")}),"FINANCIERO — apuestas jugadas"),

          h(KPI,{label:"P&L TOTAL",value:(stats.tpl>=0?"+":"")+fmt(stats.tpl),sub:fmt(stats.tsk)+" apostado",green:stats.tpl>0,red:stats.tpl<0,blue:!stats.tpl}),
