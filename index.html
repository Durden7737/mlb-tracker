input,select,button,textarea{font-family:inherit;}
input[type=date]::-webkit-calendar-picker-indicator{filter:none;}
select option{background:#fff;color:#1a1a2e;}

.drop-zone{border:2px dashed #ced4da;border-radius:10px;padding:32px 20px;text-align:center;cursor:pointer;transition:all 0.2s;background:#fff;}
.drop-zone:hover,.drop-zone.dragging{border-color:#2563eb;background:#eff6ff;}
@keyframes spin{to{transform:rotate(360deg);}}
.spin{animation:spin 1s linear infinite;display:inline-block;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.pulse{animation:pulse 1.5s ease-in-out infinite;}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

.mlb-header{

.mlb-nav{display:flex;gap:4px;flex:1;justify-content:center;flex-wrap:wrap;}
.mlb-nav button{background:transparent;border:1px solid transparent;color:rgba(255,255,255,0.78);padding:6px 11px;border-radius:6px;font-family:'Inter',system-ui,-apple-system,sans-serif;font-size:10.5px;letter-spacing:0.9px;font-weight:700;text-transform:uppercase;display:inline-flex;align-items:center;gap:5px;cursor:pointer;transition:0.15s;}

.live-match-bets{padding:10px;display:flex;flex-direction:column;gap:8px;}

.live-bet-edit{background:#fff;border:1px solid #e2e8f0;border-radius:5px;width:24px;height:24px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:11px;color:#64748b;}
.live-bet-edit:hover{background:#fef2f2;color:#dc2626;border-color:#fca5a5;}
.live-bet-pick{font-size:11.5px;color:#1a1a2e;line-height:1.4;font-weight:600;}
.live-bet-legs{display:flex;flex-direction:column;gap:4px;margin-top:2px;}
.live-bet-leg{display:flex;gap:6px;align-items:flex-start;font-size:11px;color:#475569;background:#fff;border:1px solid #e2e8f0;border-radius:6px;padding:5px 8px;}
.live-bet-leg-num{color:#94a3b8;font-weight:700;font-size:10px;flex-shrink:0;width:14px;text-align:right;}

/* ── Modal (open-all-links) ─────────────────────────────────────────────── */
.mlb-modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,0.55);z-index:9000;display:flex;align-items:center;justify-content:center;padding:20px;}
.mlb-modal{background:#fff;border-radius:12px;max-width:520px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:0 18px 40px rgba(0,0,0,0.35);padding:18px 20px;position:relative;}
.mlb-modal-close{position:absolute;top:10px;right:12px;background:transparent;border:0;font-size:20px;color:#64748b;cursor:pointer;width:28px;height:28px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;}

<body>
<div id="root"></div>
<script>
const {useState,useEffect,useRef,useCallback}=React;
const h=React.createElement;

const LS={
  get:(k)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
};

const TIPS_DEFAULT=["Claude AI","Own Analysis","ChatGPT","Gemini","Grok","Copilot"];

// MLB teams: 30 clubs — abbreviation - full name
const MLB_TEAMS=[
  {abv:"ARI",name:"Arizona Diamondbacks"},
  {abv:"ATL",name:"Atlanta Braves"},
  {abv:"BAL",name:"Baltimore Orioles"},
  {abv:"BOS",name:"Boston Red Sox"},
  {abv:"CHC",name:"Chicago Cubs"},
  {abv:"CWS",name:"Chicago White Sox"},
  {abv:"CIN",name:"Cincinnati Reds"},
  {abv:"CLE",name:"Cleveland Guardians"},
  {abv:"COL",name:"Colorado Rockies"},
  {abv:"DET",name:"Detroit Tigers"},
  {abv:"HOU",name:"Houston Astros"},
  {abv:"KC", name:"Kansas City Royals"},
  {abv:"LAA",name:"Los Angeles Angels"},
  {abv:"LAD",name:"Los Angeles Dodgers"},
  {abv:"MIA",name:"Miami Marlins"},
  {abv:"MIL",name:"Milwaukee Brewers"},
  {abv:"MIN",name:"Minnesota Twins"},
  {abv:"NYM",name:"New York Mets"},
  {abv:"NYY",name:"New York Yankees"},
  {abv:"ATH",name:"Athletics"},
  {abv:"PHI",name:"Philadelphia Phillies"},
  {abv:"PIT",name:"Pittsburgh Pirates"},
  {abv:"SD", name:"San Diego Padres"},
  {abv:"SF", name:"San Francisco Giants"},
  {abv:"SEA",name:"Seattle Mariners"},
  {abv:"STL",name:"St. Louis Cardinals"},
  {abv:"TB", name:"Tampa Bay Rays"},
  {abv:"TEX",name:"Texas Rangers"},
  {abv:"TOR",name:"Toronto Blue Jays"},
  {abv:"WSH",name:"Washington Nationals"},
];
const TEAM_LABEL=(abv)=>{const t=MLB_TEAMS.find(x=>x.abv===abv);return t?t.abv+" - "+t.name:(abv||"");};
const formatGameFromTeams=(away,home,multi)=>multi?"Multipartido":(away&&home?away+" @ "+home:away||home||"");

// Bet types — persisted in localStorage mlbt_bettypes_v1 (array of strings)
const BET_TYPES_DEFAULT=["Money Line","Run Line / Handicap","Totales (Over/Under)","Pitcher Prop","Batter Prop","Otro"];
const PROP_TYPES_PITCHER_DEFAULT=["Strikeouts","Outs","Earned Runs","Hits Allowed","Walks","NRFI","YRFI"];
const PROP_TYPES_BATTER_DEFAULT=["Hits","Total Bases","Home Runs","RBI","Runs","Walks","Stolen Base","H+R+RBI"];

// Units dropdown: 0.1, 0.25, 0.3, 0.5, 0.75, 1, 1.5, then +0.5 up to 20
const UNIT_OPTIONS=(()=>{
  const arr=[0.1,0.25,0.3,0.5,0.75,1];
  for(let u=1.5;u<=20;u+=0.5)arr.push(u);
  return arr;
})();
const today=()=>new Date().toISOString().slice(0,10);
const genId=()=>Math.random().toString(36).slice(2,10);
const fmt=(n)=>new Intl.NumberFormat("es-CO",{style:"currency",currency:"COP",maximumFractionDigits:0}).format(n);
const fmtP=(n,d=1)=>(n==null||isNaN(n))?"—":n.toFixed(d)+"%";
const getStake=(b,us)=>b.stakeOverride!=null?b.stakeOverride:Math.round(b.units*us);
const calcPL=(b,result,us)=>{
  if(b.taken===false||b.nobet)return 0;
  const s=getStake(b,us);
  if(result==="win")return Math.round(s*(b.odds-1));
  if(result==="loss")return -s;
  return 0;
};

// Migration: ensure parlays have a `legs` array; parse existing text if needed
function migrateBet(b){
  if(!b)return b;
  const out={taken:true,...b};
  if(out.isParlay){
    if(!Array.isArray(out.legs)||!out.legs.length){
      // Prefer parsing from notes (uses " · " separator, safer than " + ")
      let src=(out.notes||"").trim();
      let sep=/\s*·\s*/;
      if(!src||!src.includes("·")){
        src=(out.bet||"").replace(/^PARLAY:\s*/i,"");
        sep=src.includes("·")?/\s*·\s*/:/\s*\+\s*/;
      }
      const rawLegs=src.split(sep).map(s=>s.trim()).filter(Boolean);
      out.legs=rawLegs.map(txt=>{
        const m=txt.match(/^(.*?)\s*@\s*([0-9]+(?:\.[0-9]+)?)\s*$/);
        return m?{desc:m[1].trim(),odds:+m[2],result:"pending"}:{desc:txt,odds:null,result:"pending"};
      });
    }else{
      out.legs=out.legs.map(l=>({desc:l.desc||"",odds:l.odds==null?null:+l.odds,result:l.result||"pending"}));
    }
  }
  // New fields with sensible defaults for older bets
  if(out.betType===undefined)out.betType="";
  if(out.propType===undefined)out.propType="";
  if(out.awayTeam===undefined)out.awayTeam="";
  if(out.homeTeam===undefined)out.homeTeam="";
  if(out.multiGame===undefined)out.multiGame=!!out.isParlay&&!out.awayTeam&&!out.homeTeam&&(out.game=="Multipartido"||!out.game);
  return out;
}

// Auto-suggest parlay result from legs: all win → win; any loss → loss; any void with no loss → void if all others void/win; else pending
function suggestParlayResult(legs){
  if(!Array.isArray(legs)||!legs.length)return null;
  if(legs.some(l=>l.result==="loss"))return "loss";
  if(legs.every(l=>l.result==="win"))return "win";
  if(legs.every(l=>l.result==="win"||l.result==="void")&&legs.some(l=>l.result==="void"))return "win";
  return null;
}

// Build a staged bet: normalize it and snapshot imported values for the Reset feature
function makeStagedBet(bet){
  const mb=migrateBet({...bet});
  if(!mb.id)mb.id=genId();
  if(!mb.date)mb.date=today();
  if(mb.units==null||mb.units==="")mb.units=1;
  // Snapshot original values from the import — used by "Restablecer a importado"
  const imp={
    game:mb.game||"",bet:mb.bet||"",
    odds:mb.odds==null?null:+mb.odds,
    units:+mb.units||1,
    stakeOverride:mb.stakeOverride==null?null:+mb.stakeOverride,
    tipster:mb.tipster||"",
    notes:mb.notes||"",
    date:mb.date||today(),
    isParlay:!!mb.isParlay,
    nobet:!!mb.nobet,taken:mb.taken!==false,
    result:mb.result||"pending",
    legs:mb.isParlay&&Array.isArray(mb.legs)?mb.legs.map(l=>({desc:l.desc||"",odds:l.odds==null?null:+l.odds,result:l.result||"pending"})):null,
  };
  return {...mb,imported:imp,stagedAt:new Date().toISOString()};
}

// Convert a staged bet back to a plain bet (ready to persist into `bets`)
function finalizeStagedBet(sb){
  const {imported,stagedAt,...rest}=sb;
  return migrateBet(rest);
}

// Colors — light theme
const RC={
  win:  {bg:"#dcfce7",text:"#15803d",border:"#86efac",emoji:"✓"},
  loss: {bg:"#fee2e2",text:"#dc2626",border:"#fca5a5",emoji:"✗"},
  void: {bg:"#fef9c3",text:"#a16207",border:"#fde047",emoji:"V"},
  pending:{bg:"#f1f5f9",text:"#64748b",border:"#cbd5e1",emoji:"⏳"},
};

const TC=[
  {bg:"#dbeafe",col:"#1d4ed8",bd:"#93c5fd"},
  {bg:"#f3e8ff",col:"#7c3aed",bd:"#c4b5fd"},
  {bg:"#dcfce7",col:"#15803d",bd:"#86efac"},
  {bg:"#ffedd5",col:"#c2410c",bd:"#fdba74"},
  {bg:"#e0e7ff",col:"#4338ca",bd:"#a5b4fc"},
  {bg:"#cffafe",col:"#0e7490",bd:"#67e8f9"},
  {bg:"#fef9c3",col:"#a16207",bd:"#fde047"},
  {bg:"#fce7f3",col:"#be185d",bd:"#f9a8d4"},
  {bg:"#f0fdf4",col:"#166534",bd:"#6ee7b7"},
  {bg:"#fff7ed",col:"#9a3412",bd:"#fdba74"},
];
const TS=(name,tips)=>TC[tips.indexOf(name)%TC.length]||TC[0];

const S={
  pill:(bg,col,bd)=>({fontSize:"10px",padding:"2px 8px",borderRadius:20,background:bg,color:col,border:"1px solid "+bd,whiteSpace:"nowrap",display:"inline-block",fontWeight:600}),
  inp:{background:"#fff",border:"1px solid #e2e8f0",borderRadius:6,padding:"8px 12px",color:"#1a1a2e",width:"100%",boxSizing:"border-box",fontSize:"13px"},
  lbl:{fontSize:"9px",color:"#94a3b8",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:4,display:"block",fontWeight:600},
  card:(bc)=>({background:"#fff",border:"1px solid "+(bc||"#e2e8f0"),borderRadius:10,padding:"14px 16px",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}),
  btn:(bg,col,bd)=>({background:bg,border:"1px solid "+bd,color:col,padding:"7px 14px",borderRadius:6,cursor:"pointer",fontSize:"11px",fontFamily:"inherit",letterSpacing:"0.04em",fontWeight:600}),
  stitle:{fontSize:"10px",color:"#94a3b8",letterSpacing:"0.12em",textTransform:"uppercase",display:"flex",alignItems:"center",gap:6,marginBottom:10,fontWeight:600},
  dot:(c)=>({width:7,height:7,borderRadius:"50%",background:c,display:"inline-block",flexShrink:0}),
};

function Toggle({checked,onChange,label,color="#2563eb"}){
  return h("label",{style:{display:"flex",alignItems:"center",gap:8,cursor:"pointer",userSelect:"none"}},
    h("div",{onClick:onChange,style:{width:36,height:20,borderRadius:10,position:"relative",cursor:"pointer",flexShrink:0,background:checked?color:"#e2e8f0",border:"1px solid "+(checked?color:"#cbd5e1"),transition:"background 0.2s"}},
      h("div",{style:{position:"absolute",top:2,left:checked?16:2,width:14,height:14,borderRadius:"50%",background:"#fff",transition:"left 0.2s",boxShadow:"0 1px 2px rgba(0,0,0,0.2)"}})
    ),
    label&&h("span",{style:{fontSize:"11px",color:checked?"#1a1a2e":"#94a3b8",fontWeight:checked?600:400}},label)
  );
}

// ── TeamSelect: MLB team dropdown (ABV - Full name) ─────────────────────────
function TeamSelect({value,onChange,placeholder,disabled,compact}){
  return h("select",{value:value||"",onChange:e=>onChange(e.target.value),disabled,style:{...S.inp,...(compact?{padding:"6px 10px",fontSize:"12px"}:{}),opacity:disabled?0.5:1}},
    h("option",{value:""},placeholder||"— elegir equipo —"),
    MLB_TEAMS.map(t=>h("option",{key:t.abv,value:t.abv},t.abv+" - "+t.name))
  );
}

// ── GameSelector: two team dropdowns + multipartido toggle ─────────────────
function GameSelector({awayTeam,homeTeam,multiGame,onChange,compact,allowMulti}){
  const swap=()=>onChange({awayTeam:homeTeam,homeTeam:awayTeam,multiGame:false});
  if(multiGame){
    return h("div",{style:{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}},
      h("div",{style:{flex:"1 1 240px",padding:"8px 12px",background:"#fffbeb",border:"1px solid #fde68a",borderRadius:6,fontSize:"12px",color:"#a16207",fontWeight:700}},"🌐 Multipartido — parlay cross-game"),
      allowMulti&&h("button",{onClick:()=>onChange({multiGame:false}),style:{...S.btn("#f1f5f9","#64748b","#e2e8f0"),padding:"5px 10px",fontSize:"10px"}},"Elegir equipos")
    );
  }
  return h("div",{style:{display:"grid",gridTemplateColumns:"1fr auto 1fr"+(allowMulti?" auto":""),gap:6,alignItems:"end"}},
    h("div",null,
      h("label",{style:{...S.lbl,marginBottom:2}},"Visitante (Away)"),
      h(TeamSelect,{value:awayTeam,onChange:v=>onChange({awayTeam:v}),placeholder:"Away...",compact})
    ),
    h("div",{style:{fontSize:"18px",color:"#94a3b8",padding:"0 2px 6px",cursor:"pointer",userSelect:"none"},onClick:swap,title:"Intercambiar"},"@"),
    h("div",null,
      h("label",{style:{...S.lbl,marginBottom:2}},"Local (Home)"),
      h(TeamSelect,{value:homeTeam,onChange:v=>onChange({homeTeam:v}),placeholder:"Home...",compact})
    ),
    allowMulti&&h("button",{onClick:()=>onChange({multiGame:true,awayTeam:"",homeTeam:""}),title:"Multipartido",style:{...S.btn("#fffbeb","#a16207","#fde68a"),padding:"7px 10px",fontSize:"10px",whiteSpace:"nowrap"}},"🌐 Multi")
  );

      h("label",{style:{...S.lbl,marginBottom:2,...(highlight?{color:"#1d4ed8"}:{})}},"Unidades"),

function EditModal({bet,tipsters,unitSize,onSave,onClose,betTypes,propTypesPitcher,propTypesBatter}){
  const mb=migrateBet(bet);
  const [f,setF]=useState({
    game:mb.game||"",bet:mb.bet||"",odds:String(mb.odds||""),
    stakeOverride:mb.stakeOverride!=null?mb.stakeOverride:null,
    units:mb.units==null?1:+mb.units,
    result:mb.result||"pending",notes:mb.notes||"",date:mb.date||today(),
    tipster:mb.tipster||"",taken:mb.taken!==false,nobet:mb.nobet||false,
    isParlay:mb.isParlay||false,
    awayTeam:mb.awayTeam||"",homeTeam:mb.homeTeam||"",multiGame:!!mb.multiGame,
    betType:mb.betType||"",propType:mb.propType||"",
    legs:mb.isParlay?(mb.legs||[]).map(l=>({
      desc:l.desc||"",odds:l.odds==null?null:+l.odds,result:l.result||"pending",
      betType:l.betType||"",propType:l.propType||"",
      awayTeam:l.awayTeam||"",homeTeam:l.homeTeam||""
    })):[],
  });
  const [newTip,setNewTip]=useState("");
  const [localTips,setLocalTips]=useState(tipsters);

  const addLocalTip=()=>{
    if(!newTip.trim())return;
    setLocalTips([...localTips,newTip.trim()]);
    setF({...f,tipster:newTip.trim()});
    setNewTip("");
  };

  const effUnits=+f.units||1;
  const stake=f.nobet?0:(f.stakeOverride!=null&&f.stakeOverride!==""?+f.stakeOverride:Math.round(effUnits*unitSize));
  const potWin=f.odds&&+f.odds>1?Math.round(stake*((+f.odds)-1)):0;
  const fpatch=(p)=>setF({...f,...p});
  const updLeg=(i,p)=>setF({...f,legs:f.legs.map((l,j)=>j===i?{...l,...p}:l)});
  const addLeg=()=>setF({...f,legs:[...f.legs,{desc:"",odds:null,result:"pending",betType:"",propType:"",awayTeam:"",homeTeam:""}]});
  const rmLeg=(i)=>setF({...f,legs:f.legs.filter((_,j)=>j!==i)});
  const tipsterMissing=!f.tipster||!f.tipster.trim();

  // Auto-suggest parlay result from legs
  const legsForSuggest=f.legs.map(l=>({...l,odds:l.odds==null?null:+l.odds}));
  const suggestion=f.isParlay?suggestParlayResult(legsForSuggest):null;
  const applySuggestion=()=>{if(suggestion)setF({...f,result:suggestion});};

  const save=()=>{
    const cleanLegs=f.legs.map(l=>({
      desc:(l.desc||"").trim(),odds:l.odds==null||l.odds===""?null:+l.odds,result:l.result||"pending",
      betType:l.betType||"",propType:l.propType||"",awayTeam:l.awayTeam||"",homeTeam:l.homeTeam||""
    })).filter(l=>l.desc||l.odds!=null);
    const gameStr=f.multiGame?"Multipartido":(f.awayTeam&&f.homeTeam?f.awayTeam+" @ "+f.homeTeam:(f.game||""));
    const out={...bet,...f,
      game:gameStr,
      odds:f.nobet?null:(+f.odds||bet.odds),
      units:effUnits,
      stakeOverride:f.stakeOverride==null||f.stakeOverride===""?null:+f.stakeOverride,
      tipster:f.tipster,
      legs:f.isParlay?cleanLegs:null,
    };
    // Keep bet text in sync for parlays
    if(f.isParlay&&cleanLegs.length){
      const joined=cleanLegs.map(l=>l.desc+(l.odds!=null?" @ "+l.odds:"")).join(" + ");
      out.bet="PARLAY: "+joined;
    }
    onSave(out,localTips.filter(t=>!tipsters.includes(t)));
  };

  return h("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16},onClick:onClose},
    h("div",{style:{...S.card(),width:"100%",maxWidth:560,maxHeight:"92vh",overflowY:"auto"},onClick:e=>e.stopPropagation()},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}},
        h("div",{style:{fontSize:"14px",fontWeight:700,color:"#1a1a2e"}},"✏️ Editar apuesta"),
        h("button",{onClick:onClose,style:{...S.btn("#f1f5f9","#64748b","#e2e8f0"),padding:"4px 10px"}},"✕")
      ),
      h("div",{style:{marginBottom:10}},h("label",{style:S.lbl},"Partido"),h(GameSelector,{awayTeam:f.awayTeam,homeTeam:f.homeTeam,multiGame:f.multiGame,onChange:fpatch,allowMulti:f.isParlay})),
      h("div",{style:{marginBottom:10}},h("label",{style:S.lbl},f.isParlay?"Título / Descripción del parlay":"Apuesta / Prop"),h("input",{value:f.bet,onChange:e=>setF({...f,bet:e.target.value}),style:S.inp})),
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}},
        h("div",null,h("label",{style:S.lbl},"Fecha"),h("input",{type:"date",value:f.date,onChange:e=>setF({...f,date:e.target.value}),style:S.inp})),
        h("div",null,h("label",{style:S.lbl},f.isParlay?"Cuota total del parlay":"Cuota decimal"),h("input",{type:"number",step:"0.01",min:"1",placeholder:f.nobet?"N/A":"1.85",disabled:f.nobet,value:f.nobet?"":f.odds,onChange:e=>setF({...f,odds:e.target.value}),style:{...S.inp,opacity:f.nobet?0.5:1}}))
      ),
      h("div",{style:{marginBottom:10}},
        h(UnitsAndCOP,{units:f.units,stakeOverride:f.stakeOverride,unitSize,onChange:fpatch,disabled:f.nobet})
      ),
      !f.isParlay&&h("div",{style:{marginBottom:10}},
        h(BetTypeSelect,{betType:f.betType,propType:f.propType,onChange:fpatch,betTypes,propTypesPitcher,propTypesBatter})
      ),
      h("div",{style:{marginBottom:10}},
        h("label",{style:S.lbl},f.isParlay?"Resultado total del parlay":"Resultado"),
        h("div",{style:{display:"flex",gap:3}},
          ["pending","win","loss","void"].map(r=>{const rc=RC[r];const act=f.result===r;return h("button",{key:r,title:r,onClick:()=>fpatch({result:r}),style:{flex:1,padding:"6px 2px",borderRadius:5,fontSize:"10px",cursor:"pointer",border:"1px solid "+(act?rc.border:"#e2e8f0"),background:act?rc.bg:"#f8f9fa",color:act?rc.text:"#94a3b8",fontWeight:act?700:400}},rc.emoji+" "+r.slice(0,3).toUpperCase());})
        )

      // Tipster
      h("div",{style:{marginBottom:10}},

        h("div",{style:{display:"flex",gap:6,flexWrap:"wrap"}},
          h("select",{value:f.tipster,onChange:e=>setF({...f,tipster:e.target.value}),style:{...S.inp,flex:"1 1 140px",border:"1px solid "+(tipsterMissing?"#fca5a5":"#e2e8f0")}},
            h("option",{value:""},"— sin tipster —"),
            localTips.map(t=>h("option",{key:t,value:t},t))
          ),
          h("input",{placeholder:"Nuevo tipster...",value:newTip,onChange:e=>setNewTip(e.target.value),onKeyDown:e=>e.key==="Enter"&&addLocalTip(),style:{...S.inp,flex:"1 1 140px"}}),
          h("button",{onClick:addLocalTip,style:S.btn("#dbeafe","#1d4ed8","#93c5fd")},"+ ADD")
        )
      ),
      h("div",{style:{marginBottom:10}},h("label",{style:S.lbl},"Notas"),h("input",{value:f.notes,onChange:e=>setF({...f,notes:e.target.value}),style:S.inp,placeholder:"Notas adicionales..."})),
      !f.nobet&&f.odds&&+f.odds>1&&h("div",{style:{padding:"8px 12px",background:"#f0fdf4",border:"1px solid #86efac",borderRadius:6,fontSize:"11px",display:"flex",gap:16,marginBottom:10,flexWrap:"wrap"}},
        h("span",null,h("span",{style:{color:"#94a3b8"}},"Stake: "),h("span",{style:{color:"#15803d",fontWeight:700}},fmt(stake))),
        h("span",null,h("span",{style:{color:"#94a3b8"}},"Retorno potencial: "),h("span",{style:{color:"#15803d",fontWeight:700}},"+"+fmt(potWin))),
        f.result==="win"&&h("span",null,h("span",{style:{color:"#94a3b8"}},"P&L: "),h("span",{style:{color:"#15803d",fontWeight:700}},"+"+fmt(potWin))),
        f.result==="loss"&&h("span",null,h("span",{style:{color:"#94a3b8"}},"P&L: "),h("span",{style:{color:"#dc2626",fontWeight:700}},"-"+fmt(stake)))
      ),

        h(Toggle,{checked:!f.nobet&&f.taken,onChange:()=>setF({...f,taken:!f.taken,nobet:false}),color:"#2563eb",label:f.nobet?"◯ Sin apuesta (solo W%)":f.taken?"✓ Apuesta jugada — afecta P&L":"◯ Solo seguimiento — solo afecta precisión"}),
        h(Toggle,{checked:f.nobet,onChange:()=>setF({...f,nobet:!f.nobet,taken:false}),color:"#7c3aed",label:"Sin cuota / sin apuesta — solo cuenta para W%"}),
        h(Toggle,{checked:f.isParlay,onChange:()=>setF({...f,isParlay:!f.isParlay,legs:!f.isParlay&&f.legs.length===0?[{desc:"",odds:"",result:"pending"},{desc:"",odds:"",result:"pending"}]:f.legs}),color:"#a16207",label:"Es combinada / parlay"})

      f.isParlay&&h("div",{style:{marginTop:10,padding:"10px 12px",background:"#fffbeb",border:"1px solid #fde68a",borderRadius:8}},

// ── Scan prompt ────────────────────────────────────────────────────────────
const PROMPT=`You are a sports betting slip parser. Analyze the input (screenshot(s) and/or pasted text) and extract ALL bets shown.
Return ONLY valid JSON (no markdown, no commentary):
{
  "userOverrides": {
    "tipster": "",
    "date": "",
    "units": null,
    "notes": ""
  },
  "bets": [{
    "game": "Away Team vs Home Team",
    "awayTeam": "ABV",
    "homeTeam": "ABV",
    "multiGame": false,
    "bet": "full bet description with player name if prop",
    "betType": "Money Line | Run Line / Handicap | Totales (Over/Under) | Pitcher Prop | Batter Prop | Otro",
    "propType": "",
    "odds": 1.85,
    "stake": 1250,
    "date": "YYYY-MM-DD",
    "isParlay": false,
    "parlayLegs": [{"desc":"Leg description with line (e.g. Yankees -1.5)","odds":1.95,"betType":"","propType":"","awayTeam":"","homeTeam":""}],
    "notes": "",
    "result": "pending"
  }],
  "sportsbook": "name if visible"
}
Rules:
- Convert American odds to decimal (+150=2.50, -110=1.91).
- "stake" is a number without symbols.
- If the bet is a parlay/combinada/multiple, set isParlay=true and populate parlayLegs with one entry per leg, each containing the leg's description (including line/spread/total) AND its individual decimal odds. Also infer each leg's betType/propType/awayTeam/homeTeam if possible.
- The top-level "odds" field for a parlay is the COMBINED parlay odds. For a parlay that crosses multiple games, set multiGame=true and leave awayTeam/homeTeam empty at the top level.
- Include player names for props.
- If multiple images show the same bet, only include it once.

TEAM ABBREVIATIONS (use EXACTLY these 3-letter codes in awayTeam/homeTeam):
ARI Arizona Diamondbacks · ATL Atlanta Braves · BAL Baltimore Orioles · BOS Boston Red Sox · CHC Chicago Cubs · CWS Chicago White Sox · CIN Cincinnati Reds · CLE Cleveland Guardians · COL Colorado Rockies · DET Detroit Tigers · HOU Houston Astros · KC Kansas City Royals · LAA LA Angels · LAD LA Dodgers · MIA Miami Marlins · MIL Milwaukee Brewers · MIN Minnesota Twins · NYM NY Mets · NYY NY Yankees · ATH Athletics · PHI Philadelphia Phillies · PIT Pittsburgh Pirates · SD San Diego Padres · SF San Francisco Giants · SEA Seattle Mariners · STL St. Louis Cardinals · TB Tampa Bay Rays · TEX Texas Rangers · TOR Toronto Blue Jays · WSH Washington Nationals

PLAYER → TEAM → GAME MAPPING (for player props and parlay legs that reference a player by name):
- If a bet or leg references an MLB player (batter or pitcher prop) but the slip doesn't explicitly state which game it belongs to, use your knowledge of current MLB rosters to identify which team the player plays for.
- If a TODAY'S GAMES list is provided below, match the player's team to one of those games and set awayTeam/homeTeam accordingly.
- If you are uncertain about the player's team, or if the team isn't playing today in the provided list, leave awayTeam/homeTeam empty rather than guessing — do NOT make up a matchup.
- For parlay legs specifically: always try to populate each leg's awayTeam/homeTeam when the player is recognizable, so the staging sheet has correct game context.

BET TYPE CLASSIFICATION (MANDATORY — pick the best fit for each bet/leg):
- "Money Line": picking a team to win straight up (no spread).
- "Run Line / Handicap": spread bets like -1.5 / +1.5.
- "Totales (Over/Under)": game total runs over/under.
- "Pitcher Prop": propType one of Strikeouts | Outs | Earned Runs | Hits Allowed | Walks | NRFI | YRFI.
- "Batter Prop": propType one of Hits | Total Bases | Home Runs | RBI | Runs | Walks | Stolen Base | H+R+RBI.
- "Otro": anything else.

USER INSTRUCTIONS PARSING (VERY IMPORTANT):
- Treat the USER INSTRUCTIONS section below as metadata that OVERRIDES or FILLS GAPS in what the slip shows.
- Populate "userOverrides" with:
  - tipster: if the user mentions a tipster name (e.g. "tipster: COS", "el tipster es COS", "COS", "by COS"), set to that name. Preserve capitalization.
  - date: YYYY-MM-DD if user explicitly says a date.
  - units: decimal number if user specifies units.
  - notes: any free-form note the user wants attached.
- If no USER INSTRUCTIONS are provided, leave userOverrides fields empty strings or null.

- If a "TODAY'S GAMES" list is provided below, use it as the canonical source of matchups and rewrite awayTeam/homeTeam to match.
- If the user provides additional instructions below, follow them — they override default behavior.
Return ONLY the JSON.`;

function buildPrompt(instructions,gamesContext){
  let p=PROMPT;
  if(gamesContext&&gamesContext.trim()){
    p+="\n\nTODAY'S GAMES (canonical matchups for "+today()+"):\n"+gamesContext.trim();
  }
  if(instructions&&instructions.trim()){
    p+="\n\nUSER INSTRUCTIONS:\n"+instructions.trim();
  }
  return p;
}

async function callClaude(content,key){
  let resp;
  try{resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-opus-4-5-20251101",max_tokens:3000,messages:[{role:"user",content}]})});}catch(fe){throw new Error("No se pudo conectar con la API. Verifica tu conexión a internet.");}
  if(!resp.ok){let em="API error "+resp.status;try{const e=await resp.json();em=e.error?.message||em;}catch{}throw new Error(em);}
  let d;try{d=await resp.json();}catch{throw new Error("Respuesta inválida del servidor.");}
  const raw=(d.content?.[0]?.text||"").trim();
  if(!raw)throw new Error("La API no devolvió contenido.");
  const cleaned=raw.replace(/```json\s*/gi,"").replace(/```\s*/g,"").trim();
  const s=cleaned.indexOf("{"),e=cleaned.lastIndexOf("}");
  if(s===-1||e===-1)throw new Error("No se pudo extraer datos. Verifica el contenido enviado.");
  try{return JSON.parse(cleaned.slice(s,e+1));}catch(pe){throw new Error("Error al parsear: "+pe.message);}
}

async function scanImages(imgs,key,instructions,gamesContext){
  const content=imgs.map(({b64,mt})=>({type:"image",source:{type:"base64",media_type:mt,data:b64}}));
  content.push({type:"text",text:buildPrompt(instructions,gamesContext)});
  return callClaude(content,key);
}

async function scanText(text,key,instructions,gamesContext){
  if(!text||!text.trim())throw new Error("Pega texto de la apuesta primero.");
  const content=[{type:"text",text:buildPrompt(instructions,gamesContext)+"\n\nBET TEXT TO PARSE:\n"+text.trim()}];
  return callClaude(content,key);
}

// Parse a games-schedule screenshot into a plain-text list
const GAMES_PROMPT=`You are parsing a sports schedule screenshot. Extract the list of MLB games shown across all images.
Return PLAIN TEXT ONLY (no JSON, no markdown, no commentary). One game per line in this exact format:
"Away Team vs Home Team — HH:MM (local time if visible)"
Rules:
- Use full team names when possible (e.g. "New York Yankees vs Boston Red Sox").
- If only abbreviations are visible, keep them.
- Skip odds, probable pitchers, records, or anything else — only the matchup + time.
- If multiple images show the same game, include it only once.
- If no games are visible, return the literal string NO_GAMES.`;

async function parseGamesFromImages(imgs,key){
  const content=imgs.map(({b64,mt})=>({type:"image",source:{type:"base64",media_type:mt,data:b64}}));
  content.push({type:"text",text:GAMES_PROMPT});
  let resp;
  try{resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-opus-4-5-20251101",max_tokens:2000,messages:[{role:"user",content}]})});}catch{throw new Error("No se pudo conectar con la API.");}
  if(!resp.ok){let em="API error "+resp.status;try{const e=await resp.json();em=e.error?.message||em;}catch{}throw new Error(em);}
  let d;try{d=await resp.json();}catch{throw new Error("Respuesta inválida del servidor.");}
  const raw=(d.content?.[0]?.text||"").trim().replace(/```\w*\s*/g,"").replace(/```\s*/g,"").trim();
  if(!raw||/^NO_GAMES$/i.test(raw))throw new Error("No se detectaron partidos en la imagen.");
  return raw;
}

function toB64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>{const result=r.result||"";const parts=result.split(",");res(parts.length>1?parts[1]:result);};r.onerror=rej;r.readAsDataURL(file);});}

// Normalize parlayLegs from scanner — handle both string[] and {desc,odds}[] shapes
function normalizeScannedLegs(rawLegs){
  if(!Array.isArray(rawLegs))return [];
  return rawLegs.map(l=>{
    if(typeof l==="string"){
      const m=l.match(/^(.*?)\s*@\s*([0-9]+(?:\.[0-9]+)?)\s*$/);
      return m?{desc:m[1].trim(),odds:+m[2],result:"pending"}:{desc:l.trim(),odds:null,result:"pending"};
    }
    return {desc:(l.desc||l.description||l.leg||"").trim(),odds:l.odds==null?null:+l.odds,result:l.result||"pending"};
  }).filter(l=>l.desc||l.odds!=null);
}

  useEffect(()=>{setDraft(gamesOfDay?.text||"");},[gamesOfDay?.text,gamesOfDay?.date]);
  useEffect(()=>()=>{imgs.forEach(i=>{try{URL.revokeObjectURL(i.url);}catch{}});},[]);

  const stale=gamesOfDay&&gamesOfDay.date&&gamesOfDay.date!==today()&&gamesOfDay.text;
  const active=gamesOfDay&&gamesOfDay.date===today()&&gamesOfDay.text?gamesOfDay.text:"";
  const gameCount=active?active.split(/\n/).filter(s=>s.trim()).length:0;

  const addImgs=(list)=>{
    const incoming=Array.from(list||[]).filter(f=>f.type.startsWith("image/")||/\.(png|jpg|jpeg|webp|gif|bmp)$/i.test(f.name));
    if(!incoming.length){setLocalError("Solo imágenes.");return;}
    setLocalError(null);
    const room=MAX_GAMES_IMG-imgs.length;
    if(room<=0){setLocalError("Máximo "+MAX_GAMES_IMG+" imágenes para la lista.");return;}
    setImgs([...imgs,...incoming.slice(0,room).map(file=>({file,url:URL.createObjectURL(file)}))]);
  };
  const rmImg=(i)=>{const f=imgs[i];if(f){try{URL.revokeObjectURL(f.url);}catch{}}setImgs(imgs.filter((_,j)=>j!==i));};
  const clearImgs=()=>{imgs.forEach(i=>{try{URL.revokeObjectURL(i.url);}catch{}});setImgs([]);};

  const parseImg=async()=>{
    if(!imgs.length){setLocalError("Añade al menos una imagen.");return;}
    if(!apiKey){setLocalError("Configura tu API key primero.");return;}
    setLocalError(null);setParsing(true);
    try{
      const data=await Promise.all(imgs.map(async({file})=>{
        const b64=await toB64(file);
        const mt=file.type||(/\.png$/i.test(file.name)?"image/png":/\.(jpg|jpeg)$/i.test(file.name)?"image/jpeg":"image/png");
        return {b64,mt};
      }));
      const parsed=await parseGamesFromImages(data,apiKey);

      clearImgs();

  const useStaleAsToday=()=>{onGamesChange({date:today(),text:gamesOfDay.text});setDraft(gamesOfDay.text);};

  const headerBg=active?"#f0fdf4":stale?"#fef9c3":"#fff";

        h("span",{style:{fontSize:"18px"}},"🗓"),
        h("div",{style:{minWidth:0}},
          h("div",{style:{fontSize:"12px",fontWeight:700,color:headerColor}},"Partidos del día"),
          h("div",{style:{fontSize:"10px",color:"#64748b",marginTop:2}},
            active
              ?"✓ "+gameCount+" partidos guardados para "+gamesOfDay.date+" — se incluye como contexto en cada escaneo"
              :stale
                ?"⚠ Lista de "+gamesOfDay.date+" desactualizada (hoy "+today()+")"
                :"Ninguna lista guardada. Pega texto o imágenes para añadir contexto a los escaneos."
          )

      h("span",{style:{fontSize:"12px",color:headerColor,fontWeight:700,flexShrink:0}},expanded?"▲":"▼")
    ),

  const [files,setFiles]=useState([]); // [{file, url}]

  const [detected,setDetected]=useState(null);
  const [showKey,setShowKey]=useState(false);
  const [ki,setKi]=useState(apiKey||"");
  const [instructions,setInstructions]=useState("");
  const [pastedText,setPastedText]=useState("");
  const [pickedTipster,setPickedTipster]=useState("");

  // If picked tipster is removed from the tipsters list, clear it (don't auto-pick)
  useEffect(()=>{if(pickedTipster&&!tipsters.includes(pickedTipster))setPickedTipster("");},[tipsters]);

  // Cleanup object URLs on unmount
  useEffect(()=>()=>{files.forEach(f=>{try{URL.revokeObjectURL(f.url);}catch{}});},[]);

  const gamesActive=gamesOfDay&&gamesOfDay.date===today()&&gamesOfDay.text?gamesOfDay.text:"";

  const addFiles=(list)=>{
    const incoming=Array.from(list||[]).filter(f=>f.type.startsWith("image/")||/\.(png|jpg|jpeg|webp|gif|bmp)$/i.test(f.name));
    if(!incoming.length){setError("Solo se aceptan imágenes PNG, JPG o WEBP.");return;}
    setError(null);
    const room=MAX_IMG-files.length;
    if(room<=0){setError("Máximo "+MAX_IMG+" screenshots a la vez.");return;}
    const toAdd=incoming.slice(0,room).map(file=>({file,url:URL.createObjectURL(file)}));

    setFiles([...files,...toAdd]);
  };

  const removeFile=(i)=>{const f=files[i];if(f){try{URL.revokeObjectURL(f.url);}catch{}}setFiles(files.filter((_,j)=>j!==i));};

    const key=apiKey||ki;

    setError(null);setDetected(null);setScanning(true);
    try{
      const imgs=await Promise.all(files.map(async({file})=>{
        const b64=await toB64(file);
        const mt=file.type||(/\.png$/i.test(file.name)?"image/png":/\.(jpg|jpeg)$/i.test(file.name)?"image/jpeg":"image/png");

  // Apply userOverrides coming from the scan: set the default tipster, add it to tipsters if new

    }
  };

  const runTextScan=async()=>{
    if(!pastedText.trim()){setError("Pega el texto de la apuesta primero.");return;}
    const key=apiKey||ki;
    if(!key){setShowKey(true);setError("Configura tu API key primero.");return;}
    setError(null);setDetected(null);setScanning(true);
    try{
      const r=await scanText(pastedText,key,instructions,gamesActive);

      setDetected(r);

        ),
        h("button",{onClick:()=>setShowKey(!showKey),style:S.btn("#fff","#1d4ed8","#93c5fd")},showKey?"Cerrar":"Configurar")
      ),
      showKey&&h("div",{style:{marginTop:10,display:"flex",gap:8}},
        h("input",{type:"password",placeholder:"sk-ant-...",value:ki,onChange:e=>setKi(e.target.value),onKeyDown:e=>{if(e.key==="Enter"){onApiKeyChange(ki);setShowKey(false);}},style:{...S.inp,flex:1}}),
        h("button",{onClick:()=>{onApiKeyChange(ki);setShowKey(false);},style:S.btn("#2563eb","#fff","#2563eb")},"GUARDAR")
      ),
      h("div",{style:{fontSize:"9px",color:"#94a3b8",marginTop:6}},"Guardada en tu navegador · console.anthropic.com → API Keys")
    ),

    // GENERAL Games-of-the-day block (always visible above the sub-tabs)
    h(GamesBlock,{apiKey:apiKey||ki,gamesOfDay,onGamesChange,setSharedError:setError}),

    // Sub-tabs: Imágenes / Texto
    h("div",{style:{display:"flex",marginBottom:14,border:"1px solid #e2e8f0",borderRadius:8,overflow:"hidden",background:"#fff",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}},
      TAB("📸 Imágenes","images",files.length||null),
      TAB("📋 Texto","text",pastedText.trim()?"•":null)
    ),

    // TAB: Images
    tab==="images"&&h(React.Fragment,null,
      h("div",{className:"drop-zone"+(drag?" dragging":""),
        onClick:()=>fileInputRef.current&&fileInputRef.current.click(),
        onDrop:(e)=>{e.preventDefault();setDrag(false);addFiles(e.dataTransfer.files);},
        onDragOver:(e)=>{e.preventDefault();setDrag(true);},
        onDragLeave:()=>setDrag(false),
        style:{display:"block"}
      },
        h("input",{ref:fileInputRef,type:"file",accept:"image/*",multiple:true,style:{display:"none"},onChange:e=>{addFiles(e.target.files);e.target.value="";}}),
        h("div",{style:{fontSize:"36px",marginBottom:10}},"📸"),
        h("div",{style:{color:"#64748b",fontWeight:600,marginBottom:6}},"Arrastra hasta "+MAX_IMG+" screenshots aquí"),
        h("div",{style:{color:"#94a3b8",fontSize:"11px",marginBottom:8}},"o haz clic para seleccionar — se procesan TODAS en una sola llamada"),
        h("div",{style:{fontSize:"10px",color:"#cbd5e1"}},"PNG · JPG · WEBP · cualquier casa de apuestas")
      ),
      files.length>0&&h("div",{className:"thumb-grid"},
        files.map((f,i)=>h("div",{key:i,className:"thumb-item"},

        ))

        h("span",null,files.length+" / "+MAX_IMG+" screenshots"),

function LiveView({bets,unitSize,tipsters,onResult,onLegResult,onDelete,onToggle,onEdit}){
  const pending=bets.filter(b=>b.result==="pending");
  // Build team→match lookup from pending bets that have explicit teams.
  const teamToMatch=React.useMemo(()=>{
    const m=new Map();
    pending.forEach(b=>{
      if(b.multiGame)return;
      if(b.awayTeam)m.set(String(b.awayTeam).toUpperCase(),(b.awayTeam+" @ "+b.homeTeam));
      if(b.homeTeam)m.set(String(b.homeTeam).toUpperCase(),(b.awayTeam+" @ "+b.homeTeam));
    });
    return m;
  },[pending]);
  const findMatchesForLeg=(leg)=>{
    const out=new Set();
    const txt=((leg&&leg.desc)||"")+" "+((leg&&leg.awayTeam)||"")+" "+((leg&&leg.homeTeam)||"");
    if(leg&&leg.awayTeam&&leg.homeTeam){
      const direct=leg.awayTeam+" @ "+leg.homeTeam;
      out.add(direct);
    }
    MLB_TEAMS.forEach(t=>{
      if(new RegExp("\\b"+t.abv+"\\b","i").test(txt)){
        const mm=teamToMatch.get(t.abv.toUpperCase());
        if(mm)out.add(mm);
      }
    });
    return Array.from(out);
  };
  const matchOf=(b)=>b.multiGame?"Multipartido":(b.awayTeam&&b.homeTeam?b.awayTeam+" @ "+b.homeTeam:(b.game||"Sin partido"));
  const matchMap=new Map();
  const addToMatch=(name,bet)=>{
    const key=(name||"").trim()||"Sin partido";
    if(!matchMap.has(key))matchMap.set(key,{match:key,bets:[],dates:[]});
    const e=matchMap.get(key);
    if(!e.bets.includes(bet))e.bets.push(bet);
    if(bet.date)e.dates.push(bet.date);
  };
  pending.forEach(b=>{
    const isMulti=b.multiGame||(b.isParlay&&Array.isArray(b.legs)&&b.legs.some(l=>(l.awayTeam||l.homeTeam)&&((l.awayTeam!==b.awayTeam)||(l.homeTeam!==b.homeTeam))));
    if(isMulti&&Array.isArray(b.legs)&&b.legs.length){
      const seen=new Set();
      b.legs.forEach(leg=>{
        findMatchesForLeg(leg).forEach(m=>{if(!seen.has(m)){seen.add(m);addToMatch(m,b);}});
      });
      if(seen.size===0)addToMatch(matchOf(b),b);
    }else{
      addToMatch(matchOf(b),b);
    }
  });
  if(pending.length===0||matchMap.size===0){
    return h("div",{style:{...S.card(),textAlign:"center",padding:"40px 20px"}},
      h("div",{style:{fontSize:"36px",marginBottom:10}},"📺"),
      h("div",{style:{fontSize:"13px",color:"#15803d",fontWeight:700,marginBottom:4}},"Sin partidos en vivo"),
      h("div",{style:{fontSize:"11px",color:"#94a3b8"}},"Cuando tengas apuestas pendientes, los partidos involucrados se agruparán aquí.")
    );
  }
  const matchEntries=Array.from(matchMap.values()).sort((a,b)=>{
    const ad=a.dates.slice().sort()[0]||"9999-12-31";
    const bd=b.dates.slice().sort()[0]||"9999-12-31";
    if(ad!==bd)return ad<bd?-1:1;
    return a.match.localeCompare(b.match);
  });
  const totalBets=pending.length;
  return h(React.Fragment,null,
    h("div",{style:{...S.stitle,marginBottom:14}},h("span",{style:S.dot("#dc2626")}),"📺 LIVE — POR PARTIDO ("+matchEntries.length+" partidos · "+totalBets+" apuestas)"),
    h("div",{className:"live-match-grid"},
      matchEntries.map(entry=>{
        const dateVal=entry.dates.slice().sort()[0]||"";
        const dateStr=dateVal&&/^\d{4}-\d{2}-\d{2}$/.test(dateVal)?(()=>{const [,m,d]=dateVal.split("-").map(Number);return d+"/"+m;})():"";
        return h("div",{key:entry.match,className:"live-match-card"},
          h("div",{className:"live-match-head"},
            h("div",{className:"live-match-name"},"⚾ "+entry.match),
            h("div",{className:"live-match-meta"},
              dateStr?h("span",null,"📅 "+dateStr):null,
              h("span",{className:"live-match-count"},entry.bets.length+" apuesta"+(entry.bets.length===1?"":"s"))
            )
          ),
          h("div",{className:"live-match-bets"},
            entry.bets.map(b=>{
              const tracking=b.taken===false||b.nobet;
              const oddsTxt=b.nobet||b.odds==null?"—":Number(b.odds).toFixed(2);
              const stake=b.taken!==false&&!b.nobet?getStake(b,unitSize):0;
              const ts2=b.tipster?TS(b.tipster,tipsters):null;
              return h("div",{key:b.id,className:"live-bet-row"},
                h("div",{className:"live-bet-row-head"},
                  h("div",{className:"live-bet-row-head-left"},
                    b.isParlay?h("span",{style:S.pill("#fef9c3","#a16207","#fde047")},"🎯 PARLAY · "+((b.legs||[]).length)+" legs"):
                      tracking?h("span",{style:S.pill("#f1f5f9","#64748b","#cbd5e1")},"📊 "+(b.nobet?"SIN CUOTA":"SEGUIMIENTO")):
                      h("span",{style:S.pill("#dbeafe","#1d4ed8","#93c5fd")},(b.betType||"SINGLE")),
                    ts2?h("span",{style:{...S.pill(ts2.bg,ts2.col,ts2.bd),maxWidth:120,overflow:"hidden",textOverflow:"ellipsis"}},b.tipster):null
                  ),
                  h("div",{className:"live-bet-row-head-right"},
                    h("span",{className:"live-bet-odds"},oddsTxt),
                    stake>0?h("span",{className:"live-bet-stake"},fmt(stake)):null,
                    h("button",{className:"live-bet-edit",onClick:()=>onEdit&&onEdit(b),title:"Editar / cerrar"},"✎")
                  )
                ),
                b.isParlay&&Array.isArray(b.legs)&&b.legs.length?
                  h("div",{className:"live-bet-legs"},
                    b.legs.map((leg,i)=>{
                      const lr=leg.result||"pending";
                      const badge=lr==="win"?h("span",{title:"Ganado",style:{color:"#15803d",fontSize:11}},"✅"):
                                  lr==="loss"?h("span",{title:"Perdido",style:{color:"#dc2626",fontSize:11}},"❌"):
                                  lr==="void"?h("span",{title:"Anulado",style:{color:"#64748b",fontSize:10}},"⊘"):
                                  h("span",{title:"Pendiente",style:{color:"#94a3b8",fontSize:10}},"⏳");
                      // Highlight legs whose teams match the current card
                      const cardTeams=entry.match.split(" @ ").map(s=>s.trim().toUpperCase());
                      const isCurrent=(leg.awayTeam&&cardTeams.includes(String(leg.awayTeam).toUpperCase()))||
                                      (leg.homeTeam&&cardTeams.includes(String(leg.homeTeam).toUpperCase()))||
                                      cardTeams.some(t=>t&&new RegExp("\\b"+t+"\\b","i").test(leg.desc||""));
                      return h("div",{key:i,className:"live-bet-leg"+(isCurrent?" live-bet-leg-current":"")},
                        h("span",{className:"live-bet-leg-num"},(i+1)+"."),
                        h("div",{style:{flex:1,minWidth:0,display:"flex",gap:6,alignItems:"baseline",flexWrap:"wrap"}},
                          h("span",{style:{flex:1}},(leg.desc||"—")+(leg.odds!=null?" @ "+(+leg.odds).toFixed(2):"")),
                          badge
                        )
                      );
                    })
                  ):
                  h("div",{className:"live-bet-pick"},b.bet||"—",b.notes?h("span",{style:{color:"#94a3b8",marginLeft:6,fontSize:10.5,fontWeight:400}},"· "+b.notes):null)
              );
            })
          )
        );
      })
    )
  );
}

  const ef=()=>({tipster:"",game:"",bet:"",odds:"",units:1,stakeOverride:null,result:"pending",notes:"",date:today(),isParlay:false,taken:true,nobet:false,legs:[],awayTeam:"",homeTeam:"",multiGame:false,betType:"",propType:""});
  const [form,setForm]=useState(ef());

  useEffect(()=>{
    const b=LS.get("mlbt_v5"),u=LS.get("mlbt_u5"),t=LS.get("mlbt_t5"),k=LS.get("mlbt_k5"),tu=LS.get("mlbt_urls"),gd=LS.get("mlbt_games");

    if(Array.isArray(ptp)&&ptp.length)setPropTypesPitcher(ptp);
    const ptb=LS.get("mlbt_proptypes_batter_v1");
    if(Array.isArray(ptb)&&ptb.length)setPropTypesBatter(ptb);
    if(b)setBets(b.map(migrateBet));
    if(u){setUS(u);setUI(String(u));}
    if(t)setTips(t);
    if(k)setAK(k);
    if(tu&&typeof tu==="object"){
      const migrated={};
      Object.keys(tu).forEach(k=>{
        const v=tu[k];
        migrated[k]=typeof v==="string"?[v,""]:(Array.isArray(v)?[v[0]||"",v[1]||""]:["",""]);
      });
      setTU(migrated);
    }
    if(gd&&typeof gd==="object")setGOD({date:gd.date||"",text:gd.text||""});
    setLoaded(true);
  },[]);

  const showT=(msg,type="ok")=>{setToast({msg,type});clearTimeout(tt.current);tt.current=setTimeout(()=>setToast(null),3000);};
  const savB=(b)=>{setBets(b);LS.set("mlbt_v5",b);};
  const savU=(u)=>{setUS(u);LS.set("mlbt_u5",u);};
  const savT=(t)=>{setTips(t);LS.set("mlbt_t5",t);};
  const savK=(k)=>{setAK(k);LS.set("mlbt_k5",k);};
  const savTU=(tu)=>{setTU(tu);LS.set("mlbt_urls",tu);};
  const getTipsterUrls=(t)=>{
    const v=tUrls[t];
    if(!v)return ["",""];
    if(typeof v==="string")return [v,""];
    if(Array.isArray(v))return [v[0]||"",v[1]||""];
    return ["",""];
  };
  const setTipsterUrl=(t,idx,value)=>{
    const [u1,u2]=getTipsterUrls(t);
    const next=idx===0?[value,u2]:[u1,value];
    savTU({...tUrls,[t]:next});
  };
  const savGOD=(gd)=>{setGOD(gd);LS.set("mlbt_games",gd);};
  const savS=(s)=>{setStaging(s);LS.set("mlbt_staging_v1",s);};
  const saveSkip=(v)=>{setSkipStaging(v);LS.set("mlbt_skipstage_v1",v);};
  const savBT=(arr)=>{setBetTypes(arr);LS.set("mlbt_bettypes_v1",arr);};
  const savPTP=(arr)=>{setPropTypesPitcher(arr);LS.set("mlbt_proptypes_pitcher_v1",arr);};
  const savPTB=(arr)=>{setPropTypesBatter(arr);LS.set("mlbt_proptypes_batter_v1",arr);};
  const addBetType=(t)=>{const v=(t||"").trim();if(!v||betTypes.includes(v))return;savBT([...betTypes,v]);};
  const removeBetType=(t)=>{if(BET_TYPES_DEFAULT.includes(t))return;savBT(betTypes.filter(x=>x!==t));};
  const addPropTypePitcher=(t)=>{const v=(t||"").trim();if(!v||propTypesPitcher.includes(v))return;savPTP([...propTypesPitcher,v]);};
  const removePropTypePitcher=(t)=>{if(PROP_TYPES_PITCHER_DEFAULT.includes(t))return;savPTP(propTypesPitcher.filter(x=>x!==t));};
  const addPropTypeBatter=(t)=>{const v=(t||"").trim();if(!v||propTypesBatter.includes(v))return;savPTB([...propTypesBatter,v]);};
  const removePropTypeBatter=(t)=>{if(PROP_TYPES_BATTER_DEFAULT.includes(t))return;savPTB(propTypesBatter.filter(x=>x!==t));};

  // ── Staging operations ────────────────────────────────────────────────────
  const pushToStaging=(rawBet)=>{savS([makeStagedBet(rawBet),...staging]);};
  const updStagedField=(id,patch)=>savS(staging.map(s=>s.id===id?{...s,...patch}:s));
  const updStagedLeg=(id,idx,patch)=>savS(staging.map(s=>{
    if(s.id!==id||!Array.isArray(s.legs))return s;
    return {...s,legs:s.legs.map((l,i)=>i===idx?{...l,...patch}:l)};
  }));
  const addStagedLeg=(id)=>savS(staging.map(s=>s.id===id?{...s,legs:[...(s.legs||[]),{desc:"",odds:null,result:"pending"}]}:s));
  const removeStagedLeg=(id,idx)=>savS(staging.map(s=>s.id===id?{...s,legs:(s.legs||[]).filter((_,i)=>i!==idx)}:s));
  const resetStaged=(id)=>savS(staging.map(s=>{
    if(s.id!==id||!s.imported)return s;
    const imp=s.imported;
    return {...s,
      game:imp.game,bet:imp.bet,odds:imp.odds,
      units:imp.units,stakeOverride:imp.stakeOverride,
      tipster:imp.tipster,notes:imp.notes,date:imp.date,
      isParlay:imp.isParlay,nobet:imp.nobet,taken:imp.taken,
      result:imp.result||"pending",
      legs:imp.legs?imp.legs.map(l=>({...l})):null,
    };
  }));
  const deleteStaged=(id)=>{savS(staging.filter(s=>s.id!==id));showT("Apuesta descartada","warn");};
  const confirmStaged=(id)=>{
    const s=staging.find(x=>x.id===id);if(!s)return;
    // Validation: parlays need at least 1 leg with desc; non-parlays need odds (unless nobet)
    const hasGame=s.multiGame||(s.awayTeam&&s.homeTeam)||(s.game&&s.game.trim());
    if(!hasGame||!s.bet){showT("Falta partido (equipos o Multipartido) o descripción","err");return;}
    if(!s.nobet&&(s.odds==null||s.odds==="")){showT("Falta la cuota","err");return;}
    if(!s.tipster||!String(s.tipster).trim())showT("⚠ Se confirmó sin tipster — recuerda completarlo","warn");
    const finalized=finalizeStagedBet(s);
    savB([finalized,...bets]);
    savS(staging.filter(x=>x.id!==id));
    showT("Apuesta confirmada ✓");
  };
  const confirmAllStaged=()=>{
    if(!staging.length){showT("No hay apuestas en staging","warn");return;}
    const valid=[],invalid=[];
    staging.forEach(s=>{
      const hasG=s.multiGame||(s.awayTeam&&s.homeTeam)||(s.game&&s.game.trim());
      if(!hasG||!s.bet||(!s.nobet&&(s.odds==null||s.odds==="")))invalid.push(s);
      else valid.push(s);
    });
    if(!valid.length){showT("Ninguna apuesta válida — revisa partido, descripción y cuota","err");return;}
    savB([...valid.map(finalizeStagedBet),...bets]);
    savS(invalid);
    showT("Confirmadas "+valid.length+(invalid.length?" · "+invalid.length+" con errores":""));
  };
  const resetAllStaged=()=>{
    if(!staging.length)return;
    if(!confirm("¿Restablecer TODAS las apuestas en staging a sus valores importados?"))return;
    savS(staging.map(s=>{
      if(!s.imported)return s;
      const imp=s.imported;
      return {...s,game:imp.game,bet:imp.bet,odds:imp.odds,units:imp.units,stakeOverride:imp.stakeOverride,tipster:imp.tipster,notes:imp.notes,date:imp.date,isParlay:imp.isParlay,nobet:imp.nobet,taken:imp.taken,result:imp.result||"pending",legs:imp.legs?imp.legs.map(l=>({...l})):null};
    }));
    showT("Restablecidas ✓");
  };
  const clearAllStaged=()=>{
    if(!staging.length)return;
    if(!confirm("¿Descartar TODAS las apuestas en staging? No se confirman al tracker."))return;
    savS([]);showT("Staging limpio","warn");
  };

  const updR=(id,r)=>savB(bets.map(b=>b.id===id?{...b,result:r}:b));
  const updLegR=(id,idx,r)=>savB(bets.map(b=>{
    if(b.id!==id||!Array.isArray(b.legs))return b;
    const newLegs=b.legs.map((l,i)=>i===idx?{...l,result:r}:l);
    return {...b,legs:newLegs};
  }));
  const togT=(id)=>savB(bets.map(b=>b.id===id?{...b,taken:!(b.taken!==false)}:b));
  const delB=(id)=>{savB(bets.filter(b=>b.id!==id));showT("Eliminada","warn");};

  const addBet=()=>{
    if(!form.bet){showT("Completa la descripción de la apuesta","err");return;}
    if(!form.multiGame&&!form.awayTeam&&!form.homeTeam&&!form.game){showT("Selecciona partido (equipos) o marca Multipartido","err");return;}
    if(!form.nobet&&!form.odds){showT("Ingresa la cuota","err");return;}
    const gameStr=form.multiGame?"Multipartido":(form.awayTeam&&form.homeTeam?form.awayTeam+" @ "+form.homeTeam:(form.game||""));
    const cleanLegs=form.isParlay?form.legs.map(l=>({
      desc:(l.desc||"").trim(),odds:l.odds===""||l.odds==null?null:+l.odds,result:l.result||"pending",
      betType:l.betType||"",propType:l.propType||"",awayTeam:l.awayTeam||"",homeTeam:l.homeTeam||""
    })).filter(l=>l.desc||l.odds!=null):null;
    const nb={...form,id:genId(),game:gameStr,odds:form.nobet?null:(+form.odds||null),units:+form.units||1,stakeOverride:form.stakeOverride==null||form.stakeOverride===""?null:+form.stakeOverride,legs:cleanLegs};
    if(form.isParlay&&cleanLegs&&cleanLegs.length){
      const joined=cleanLegs.map(l=>l.desc+(l.odds!=null?" @ "+l.odds:"")).join(" + ");
      if(!nb.bet||/^PARLAY:/i.test(nb.bet))nb.bet="PARLAY: "+joined;
    }

  // ── Stats: Win Rate counts INDIVIDUAL LEGS for parlays with leg results ─
  // P&L always uses parlay-level result (legs only affect win %).
  const stats=(()=>{
    const tb=bets.filter(b=>b.taken!==false&&!b.nobet);
    const tpl=bets.reduce((a,b)=>a+calcPL(b,b.result,unitSize),0);

    // Per-LEG contribution (parlay contributes one entry per decided leg)
    function contributions(b){
      if(b.isParlay&&Array.isArray(b.legs)&&b.legs.some(l=>l.result==="win"||l.result==="loss")){
        return b.legs.filter(l=>l.result==="win"||l.result==="loss").map(l=>({result:l.result,taken:b.taken!==false&&!b.nobet}));
      }
      if(b.result==="win"||b.result==="loss")return [{result:b.result,taken:b.taken!==false&&!b.nobet}];
      return [];
    }
    // Per-BET contribution (parlay counts as ONE entry using its top-level result)
    function contributionsByBet(b){
      if(b.result==="win"||b.result==="loss")return [{result:b.result,taken:b.taken!==false&&!b.nobet}];
      return [];
    }

    // Accuracy across ALL picks (including non-taken) — legs
    let aw=0,al=0;
    bets.forEach(b=>contributions(b).forEach(c=>{if(c.result==="win")aw++;else al++;}));

    // Win rate across TAKEN picks only — legs
    let tw=0,tl=0;
    tb.forEach(b=>contributions(b).forEach(c=>{if(c.taken){if(c.result==="win")tw++;else tl++;}}));

    // PER-BET versions (parlay counts once)
    let awB=0,alB=0,twB=0,tlB=0;
    bets.forEach(b=>contributionsByBet(b).forEach(c=>{if(c.result==="win")awB++;else alB++;}));
    tb.forEach(b=>contributionsByBet(b).forEach(c=>{if(c.taken){if(c.result==="win")twB++;else tlB++;}}));

    const ts2Count=tw+tl;
    const asCount=aw+al;
    const ts2CountB=twB+tlB;
    const asCountB=awB+alB;
    const tsk=tb.reduce((a,b)=>(b.result!=="pending"&&b.result!=="void")?a+getStake(b,unitSize):a,0);
    const roi=tsk>0?tpl/tsk*100:0;
    const pend=bets.filter(b=>b.result==="pending");
    const pot=pend.filter(b=>b.taken!==false&&!b.nobet).reduce((a,b)=>a+getStake(b,unitSize)*b.odds,0);

    // Per-tipster stats with leg-aware win rate
    const byT=tipsters.map(t=>{
      const all=bets.filter(b=>b.tipster===t);if(!all.length)return null;
      const tak=all.filter(b=>b.taken!==false&&!b.nobet);
      let aw2=0,al2=0,tw2=0,tl2=0;
      all.forEach(b=>contributions(b).forEach(c=>{if(c.result==="win")aw2++;else al2++;}));
      tak.forEach(b=>contributions(b).forEach(c=>{if(c.taken){if(c.result==="win")tw2++;else tl2++;}}));
      const pl=tak.reduce((a,b)=>a+calcPL(b,b.result,unitSize),0);
      const sk=tak.reduce((a,b)=>(b.result!=="pending"&&b.result!=="void")?a+getStake(b,unitSize):a,0);
      const as2=aw2+al2,ts3=tw2+tl2;
      return {name:t,total:all.length,tak:tak.length,pl,sk,roi:sk>0?pl/sk*100:0,
        acc:as2>0?aw2/as2*100:null,wr:ts3>0?tw2/ts3*100:null};
    }).filter(Boolean);

    return {tpl,roi,tw,tl,aw,al,as:asCount,
      acc:asCount>0?aw/asCount*100:null,wr:ts2Count>0?tw/ts2Count*100:null,
      // Per-bet (parlay counts once) — useful to compare against per-leg
      twB,tlB,awB,alB,asB:asCountB,
      accByBet:asCountB>0?awB/asCountB*100:null,
      wrByBet:ts2CountB>0?twB/ts2CountB*100:null,
      pend:pend.length,pot,total:bets.length,tak:tb.length,ntk:bets.filter(b=>b.taken===false).length,
      nobet:bets.filter(b=>b.nobet).length,tsk,byT};
  })();

              ?h(React.Fragment,null,h("input",{value:uIn,onChange:e=>setUI(e.target.value),type:"number",step:"500",style:{...S.inp,width:130}}),h("span",{style:{color:"#94a3b8",fontSize:"11px"}},"COP"),h("button",{onClick:saveUnit,style:S.btn("#2563eb","#fff","#2563eb")},"GUARDAR"),h("button",{onClick:()=>setEU(false),style:S.btn("#f1f5f9","#64748b","#e2e8f0")},"CANCELAR"))
              :h(React.Fragment,null,h("span",{style:{fontSize:"20px",fontWeight:800,color:"#2563eb"}},fmt(unitSize)),h("button",{onClick:()=>setEU(true),style:S.btn("#eff6ff","#1d4ed8","#93c5fd")},"EDITAR"))
          )
        ),
        h("div",{style:{...S.card(),marginBottom:14}},
          h("div",{style:{fontSize:"11px",color:"#64748b",marginBottom:4,fontWeight:700}},"🏷 Tipos de apuesta"),
          h("div",{style:{fontSize:"10px",color:"#94a3b8",marginBottom:10,lineHeight:1.5}},"Lista global de tipos de apuesta que aparecen en los dropdowns. Los predefinidos (Money Line, Run Line, etc.) no se pueden eliminar. Puedes añadir tipos personalizados que persistirán en tus apuestas futuras."),
          h(CustomTypeManager,{title:"Tipos de apuesta",items:betTypes,defaults:BET_TYPES_DEFAULT,onAdd:addBetType,onRemove:removeBetType}),
          h("div",{style:{height:10}}),
          h(CustomTypeManager,{title:"Props de pitcher",items:propTypesPitcher,defaults:PROP_TYPES_PITCHER_DEFAULT,onAdd:addPropTypePitcher,onRemove:removePropTypePitcher}),
          h("div",{style:{height:10}}),
          h(CustomTypeManager,{title:"Props de bateador",items:propTypesBatter,defaults:PROP_TYPES_BATTER_DEFAULT,onAdd:addPropTypeBatter,onRemove:removePropTypeBatter})
        ),
        h("div",{style:S.card()},
          h("div",{style:{fontSize:"11px",color:"#64748b",marginBottom:4,fontWeight:700}},"💾 Backup / Datos"),
          h("div",{style:{fontSize:"10px",color:"#94a3b8",marginBottom:10,lineHeight:1.5}},"Descarga una copia completa de todas tus apuestas. El Excel incluye hojas separadas para apuestas, legs de parlays, tipsters y resumen."),
          h("div",{style:{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}},
            h("button",{onClick:exportXLSX,style:{...S.btn("#dcfce7","#15803d","#86efac"),fontWeight:700}},"📊 EXPORTAR EXCEL (.xlsx)"),
            h("button",{onClick:exportJSON,style:S.btn("#eff6ff","#1d4ed8","#93c5fd")},"⬇ Backup JSON"),
            h("label",{style:{...S.btn("#f3e8ff","#7c3aed","#c4b5fd"),cursor:"pointer"}},"⬆ Importar JSON",
              h("input",{type:"file",accept:".json",style:{display:"none"},onChange:e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.bets)savB(d.bets.map(migrateBet));if(d.unitSize){savU(d.unitSize);setUI(String(d.unitSize));}if(d.tipsters)savT(d.tipsters);if(d.tipsterUrls)savTU(d.tipsterUrls);showT("Importado ✓");}catch{showT("Archivo inválido","err");}};r.readAsText(f);}})
            )
          ),
          h("button",{onClick:()=>{if(confirm("¿Borrar todo? No hay vuelta atrás.")){savB([]);showT("Datos borrados","warn");}},style:S.btn("#fee2e2","#dc2626","#fca5a5")},"🗑 Borrar todo")
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
